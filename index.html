<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBox-Education</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: {
                        medbox: {
                            dark: '#0f6b7a',
                            main: '#138496',
                            light: '#e0f2f4',
                            accent: '#f39c12'
                        }
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ======================================================= -->
    <!-- Firebase SDK v11 (ESM via CDN)                          -->
    <!-- ======================================================= -->
    <script type="module">
        import { initializeApp }                            from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged,
                 signInWithEmailAndPassword, signOut,
                 createUserWithEmailAndPassword }           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, doc,
                 getDocs, getDoc, setDoc, addDoc,
                 updateDoc, deleteDoc, onSnapshot,
                 query, where, serverTimestamp }            from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // =====================================================
        // ⚙️  إعدادات Firebase — استبدل هذه القيم بإعداداتك  
        // =====================================================
        const firebaseConfig = {
            apiKey:            "PASTE_YOUR_API_KEY_HERE",
            authDomain:        "PASTE_YOUR_PROJECT_ID.firebaseapp.com",
            projectId:         "PASTE_YOUR_PROJECT_ID",
            storageBucket:     "PASTE_YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "PASTE_YOUR_SENDER_ID",
            appId:             "PASTE_YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // --- نشر الـ SDK على window ليستخدمها React ---
        window._firebase = {
            auth, db,
            onAuthStateChanged, signInWithEmailAndPassword,
            signOut, createUserWithEmailAndPassword,
            collection, doc, getDocs, getDoc,
            setDoc, addDoc, updateDoc, deleteDoc,
            onSnapshot, query, where, serverTimestamp
        };
        window._firebaseReady = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #138496; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #0f6b7a; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0f2f4;
            border-top-color: #138496;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden flex flex-col font-sans">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ===========================================================
        // أيقونات SVG
        // ===========================================================
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                book:        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>,
                stethoscope: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>,
                activity:    <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>,
                settings:    <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>,
                bell:        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>,
                login:       <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>,
                logout:      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>,
                user:        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>,
                users:       <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>,
                plus:        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>,
                trash:       <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
                edit:        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>,
                chevronDown: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>,
                chevronLeft: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>,
                shield:      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>,
                eye:         <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>,
                eyeOff:      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>,
                cloud:       <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>,
            };
            return icons[name] || null;
        };

        // ===========================================================
        // شاشة الإعداد — تظهر عندما لم يتم تهيئة Firebase بعد
        // ===========================================================
        const SetupScreen = () => (
            <div className="h-screen flex items-center justify-center bg-gray-50 p-6">
                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 p-10 max-w-lg w-full text-center">
                    <div className="w-16 h-16 bg-medbox-light rounded-2xl flex items-center justify-center mx-auto mb-6">
                        <Icon name="cloud" className="w-8 h-8 text-medbox-main" />
                    </div>
                    <h1 className="text-2xl font-bold text-gray-800 mb-2">MedBox-Education</h1>
                    <p className="text-gray-500 mb-6 text-sm leading-relaxed">
                        يحتاج التطبيق إلى ربط Firebase. افتح الملف في محرر النصوص وابحث عن السطر:
                    </p>
                    <div className="bg-gray-50 rounded-lg p-4 text-right font-mono text-xs text-gray-700 border border-gray-200 mb-6 leading-loose" dir="ltr">
                        <p><span className="text-blue-600">const</span> firebaseConfig = {'{'}</p>
                        <p className="text-red-500 font-bold mr-4">apiKey: "PASTE_YOUR_API_KEY_HERE",</p>
                        <p className="text-red-500 font-bold mr-4">projectId: "PASTE_YOUR_PROJECT_ID",</p>
                        <p>{'}'}</p>
                    </div>
                    <div className="bg-medbox-light rounded-lg p-4 text-right text-sm text-medbox-dark">
                        <p className="font-bold mb-1">خطوات الإعداد السريع:</p>
                        <ol className="list-decimal list-inside space-y-1 text-xs">
                            <li>اذهب إلى console.firebase.google.com</li>
                            <li>أنشئ مشروعاً جديداً مجانياً</li>
                            <li>فعّل Firestore Database و Authentication (Email/Password)</li>
                            <li>انسخ إعدادات المشروع (Project Settings) والصقها هنا</li>
                            <li>أضف أول مستخدم مدير من تبويب Authentication</li>
                            <li>في Firestore، أنشئ مجموعة <strong>users</strong> وأضف وثيقة بـ uid المدير: {'{ role: "admin" }'}</li>
                        </ol>
                    </div>
                </div>
            </div>
        );

        // ===========================================================
        // شاشة تسجيل الدخول
        // ===========================================================
        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail]       = useState('');
            const [password, setPassword] = useState('');
            const [showPass, setShowPass] = useState(false);
            const [error, setError]       = useState('');
            const [loading, setLoading]   = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const { signInWithEmailAndPassword, auth } = window._firebase;
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    const msgs = {
                        'auth/user-not-found':  'البريد الإلكتروني غير مسجل.',
                        'auth/wrong-password':  'كلمة المرور غير صحيحة.',
                        'auth/invalid-email':   'صيغة البريد الإلكتروني غير صحيحة.',
                        'auth/too-many-requests': 'محاولات كثيرة، حاول لاحقاً.',
                        'auth/invalid-credential': 'البريد أو كلمة المرور غير صحيحة.',
                    };
                    setError(msgs[err.code] || 'حدث خطأ، حاول مجدداً.');
                }
                setLoading(false);
            };

            return (
                <div className="h-screen flex items-center justify-center bg-gradient-to-br from-medbox-light to-gray-100 p-4">
                    <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 w-full max-w-md fade-in">
                        <div className="flex flex-col items-center mb-8">
                            <div className="bg-medbox-main text-white p-3 rounded-2xl shadow-md mb-4">
                                <Icon name="activity" className="w-8 h-8" />
                            </div>
                            <h1 className="text-2xl font-bold text-medbox-dark">MedBox-Education</h1>
                            <p className="text-gray-500 text-sm mt-1">سجّل دخولك للمتابعة</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">البريد الإلكتروني</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={e => setEmail(e.target.value)}
                                    placeholder="example@email.com"
                                    dir="ltr"
                                    className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main focus:border-transparent"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                                <div className="relative">
                                    <input
                                        type={showPass ? 'text' : 'password'}
                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                        placeholder="••••••••"
                                        dir="ltr"
                                        className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main focus:border-transparent pl-10"
                                        required
                                    />
                                    <button
                                        type="button"
                                        onClick={() => setShowPass(!showPass)}
                                        className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                                    >
                                        <Icon name={showPass ? 'eyeOff' : 'eye'} className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>

                            {error && (
                                <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
                                    {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-medbox-main hover:bg-medbox-dark text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm disabled:opacity-60"
                            >
                                {loading ? <div className="spinner" style={{width:20,height:20,borderWidth:2}} /> : <Icon name="login" className="w-5 h-5" />}
                                {loading ? 'جاري تسجيل الدخول...' : 'تسجيل الدخول'}
                            </button>
                        </form>

                        <div className="mt-6 pt-4 border-t border-gray-100 text-center">
                            <p className="text-xs text-gray-400">
                                للمدير: تأكد من إعداد Firebase Security Rules وإضافة دور المستخدم في Firestore.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // ===========================================================
        // شاشة التحميل
        // ===========================================================
        const LoadingScreen = ({ message = 'جاري التحميل...' }) => (
            <div className="h-screen flex flex-col items-center justify-center gap-4 bg-gray-50">
                <div className="spinner"></div>
                <p className="text-gray-500 text-sm">{message}</p>
            </div>
        );

        // ===========================================================
        // شاشة الطالب (قراءة فقط)
        // ===========================================================
        const StudentPortal = ({ currentUser, programs, onLogout }) => {
            // جمع الدورات المسجل بها الطالب فقط
            const myEnrollments = [];
            programs.forEach(prog => {
                prog.courses.forEach(course => {
                    const me = course.students.find(s => s.uid === currentUser.uid || s.email === currentUser.email);
                    if (me) myEnrollments.push({ ...me, courseName: course.name, courseCode: course.code, supervisor: course.supervisor, programName: prog.name });
                });
            });

            return (
                <div className="h-full flex flex-col">
                    {/* Navbar */}
                    <nav className="bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-6 py-3 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-medbox-main text-white p-2 rounded-lg">
                                <Icon name="activity" />
                            </div>
                            <h1 className="text-xl font-bold text-medbox-dark">MedBox<span className="font-light text-gray-500">-Education</span></h1>
                            <span className="bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1 rounded-full">بوابة المتدرب</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2 text-sm text-gray-600">
                                <div className="w-8 h-8 bg-medbox-main text-white rounded-full flex items-center justify-center font-bold text-sm">
                                    {currentUser.displayName?.charAt(0) || currentUser.email?.charAt(0).toUpperCase()}
                                </div>
                                <span className="hidden md:block">{currentUser.displayName || currentUser.email}</span>
                            </div>
                            <button onClick={onLogout} className="flex items-center gap-2 text-gray-500 hover:text-red-500 text-sm transition-colors px-3 py-2 rounded-lg hover:bg-red-50">
                                <Icon name="logout" className="w-4 h-4" />
                                <span className="hidden md:block">خروج</span>
                            </button>
                        </div>
                    </nav>

                    <div className="flex-1 overflow-y-auto p-6 md:p-8 fade-in">
                        {/* ترحيب */}
                        <div className="bg-gradient-to-l from-medbox-main to-medbox-dark rounded-2xl p-6 text-white mb-8">
                            <h2 className="text-2xl font-bold mb-1">مرحباً، {currentUser.displayName || 'متدرب'} 👋</h2>
                            <p className="text-medbox-light text-sm">هذه دوراتك المسجّلة وتقدمك الأكاديمي</p>
                        </div>

                        {myEnrollments.length === 0 ? (
                            <div className="text-center py-16 text-gray-400">
                                <Icon name="book" className="w-16 h-16 mx-auto mb-4 opacity-30" />
                                <p className="text-lg font-medium">لم يتم تسجيلك في أي دورة بعد</p>
                                <p className="text-sm mt-2">تواصل مع المدرب أو مدير البرنامج لإضافتك.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {myEnrollments.map((enr, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                                        <div className="bg-medbox-light px-6 py-4 border-b border-gray-100">
                                            <span className="text-xs font-bold text-medbox-main bg-white px-2 py-1 rounded">{enr.programName}</span>
                                            <h3 className="font-bold text-medbox-dark mt-2">{enr.courseName}</h3>
                                            <p className="text-xs text-gray-500 mt-1 font-mono">{enr.courseCode}</p>
                                        </div>
                                        <div className="p-5 space-y-4">
                                            {/* المدرب */}
                                            <div className="flex items-center gap-2 text-sm text-gray-600">
                                                <Icon name="user" className="w-4 h-4 text-medbox-main" />
                                                <span>المدرب: <strong>{enr.supervisor}</strong></span>
                                            </div>
                                            {/* التقدم */}
                                            <div>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-sm text-gray-600">نسبة الإنجاز</span>
                                                    <span className="font-bold text-medbox-main">{enr.progress || 0}%</span>
                                                </div>
                                                <div className="w-full bg-gray-200 rounded-full h-2.5">
                                                    <div className="bg-medbox-main h-2.5 rounded-full transition-all" style={{ width: `${enr.progress || 0}%` }}></div>
                                                </div>
                                            </div>
                                            {/* الحالة والمستوى */}
                                            <div className="flex gap-3">
                                                <span className={`text-xs font-bold px-3 py-1 rounded-full ${enr.status === 'نشط' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                                                    {enr.status || 'نشط'}
                                                </span>
                                                {enr.level && <span className="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">{enr.level}</span>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ===========================================================
        // التطبيق الرئيسي (مدير + مدرب)
        // ===========================================================
        const MainApp = ({ currentUser, userProfile, programs, setPrograms, onLogout, showToast }) => {
            const [activeTab, setActiveTab]         = useState('programs');
            const [selectedProgram, setSelectedProgram] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [modal, setModal]                 = useState(null); // { type, data }
            const [loading, setLoading]             = useState(false);

            const fb = window._firebase;
            const isAdmin   = userProfile.role === 'admin';
            const isTrainer = userProfile.role === 'trainer';

            // فلترة البرامج حسب الدور
            const visiblePrograms = isAdmin
                ? programs
                : programs.map(prog => ({
                    ...prog,
                    courses: prog.courses.filter(c =>
                        (userProfile.assignedCourseIds || []).includes(c.id)
                    )
                  })).filter(p => p.courses.length > 0);

            // -------------------------------------------------------
            // CRUD — برامج
            // -------------------------------------------------------
            const handleAddProgram = async (formData) => {
                setLoading(true);
                try {
                    const newProg = { ...formData, courses: [], createdAt: fb.serverTimestamp() };
                    const ref = await fb.addDoc(fb.collection(fb.db, 'programs'), newProg);
                    setPrograms(prev => [...prev, { ...newProg, id: ref.id, courses: [] }]);
                    showToast('تمت إضافة البرنامج بنجاح ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteProgram = async (programId) => {
                if (!confirm('هل أنت متأكد من حذف هذا البرنامج وجميع دوراته؟')) return;
                setLoading(true);
                try {
                    await fb.deleteDoc(fb.doc(fb.db, 'programs', programId));
                    setPrograms(prev => prev.filter(p => p.id !== programId));
                    if (selectedProgram?.id === programId) setSelectedProgram(null);
                    showToast('تم حذف البرنامج ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // -------------------------------------------------------
            // CRUD — دورات
            // -------------------------------------------------------
            const handleAddCourse = async (programId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const newCourse = { ...formData, id: Date.now(), students: [] };
                    const updatedCourses = [...(prog.courses || []), newCourse];
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p =>
                        p.id === programId ? { ...p, courses: updatedCourses } : p
                    ));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تمت إضافة الدورة ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteCourse = async (programId, courseId) => {
                if (!confirm('هل أنت متأكد من حذف هذه الدورة؟')) return;
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.filter(c => c.id !== courseId);
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p =>
                        p.id === programId ? { ...p, courses: updatedCourses } : p
                    ));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم حذف الدورة ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // -------------------------------------------------------
            // CRUD — طلاب
            // -------------------------------------------------------
            const handleAddStudent = async (programId, courseId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: [...(c.students||[]), { ...formData, id: Date.now(), progress: 0, status: 'نشط' }] };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تمت إضافة المتدرب ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteStudent = async (programId, courseId, studentId) => {
                if (!confirm('هل أنت متأكد من حذف هذا المتدرب؟')) return;
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: c.students.filter(s => s.id !== studentId) };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    if (selectedStudent?.id === studentId) setSelectedStudent(null);
                    showToast('تم حذف المتدرب ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleUpdateProgress = async (programId, courseId, studentId, newProgress) => {
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: c.students.map(s => s.id === studentId ? { ...s, progress: newProgress } : s) };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم تحديث التقدم ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
            };

            // -------------------------------------------------------
            // Navbar
            // -------------------------------------------------------
            const roleBadge = {
                admin:   { label: 'مدير عام', color: 'bg-medbox-light text-medbox-dark' },
                trainer: { label: 'مدرب',     color: 'bg-purple-100 text-purple-700' },
            }[userProfile.role] || {};

            const Navbar = () => (
                <nav className="bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-6 py-3 shrink-0 z-10 relative">
                    <div className="flex items-center gap-6">
                        <div className="flex items-center gap-2">
                            <div className="bg-medbox-main text-white p-2 rounded-lg">
                                <Icon name="activity" />
                            </div>
                            <h1 className="text-xl font-bold text-medbox-dark">MedBox<span className="font-light text-gray-500">-Education</span></h1>
                        </div>
                        <div className="hidden md:flex items-center gap-1 bg-gray-100 rounded-lg p-1">
                            {['programs','skills','books'].map(tab => (
                                <button key={tab}
                                    onClick={() => { setActiveTab(tab); setSelectedStudent(null); }}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab===tab ? 'bg-white text-medbox-main shadow-sm' : 'text-gray-600 hover:text-medbox-main'}`}
                                >
                                    {tab==='programs'?'البرامج التدريبية':tab==='skills'?'المهارات السريرية':'كتب وأبحاث'}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="flex items-center gap-3">
                        <span className={`text-xs font-bold px-3 py-1 rounded-full ${roleBadge.color}`}>{roleBadge.label}</span>
                        <div className="flex items-center gap-2 text-sm text-gray-600 border-r pr-3 border-gray-200">
                            <div className="w-8 h-8 bg-medbox-main text-white rounded-full flex items-center justify-center font-bold text-sm">
                                {currentUser.email?.charAt(0).toUpperCase()}
                            </div>
                            <span className="hidden md:block text-xs">{currentUser.email}</span>
                        </div>
                        <button onClick={onLogout} title="تسجيل الخروج" className="p-2 text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                            <Icon name="logout" className="w-5 h-5" />
                        </button>
                    </div>
                </nav>
            );

            // -------------------------------------------------------
            // Sidebar
            // -------------------------------------------------------
            const Sidebar = () => {
                if (!selectedProgram) return (
                    <aside className="w-80 bg-white border-l border-gray-200 flex flex-col p-6 items-center justify-center text-center shadow-inner shrink-0">
                        <Icon name="book" className="w-16 h-16 text-gray-300 mb-4" />
                        <h3 className="text-gray-500 font-medium text-sm">اختر برنامجاً لعرض دوراته</h3>
                    </aside>
                );

                const prog = programs.find(p => p.id === selectedProgram.id) || selectedProgram;

                return (
                    <aside className="w-80 bg-gray-50 border-l border-gray-200 flex flex-col h-full overflow-hidden shrink-0 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)]">
                        <div className="bg-medbox-main text-white p-5 shrink-0 shadow-md">
                            <h2 className="text-base font-bold flex items-center gap-2">
                                <Icon name="activity" className="w-4 h-4" />
                                <span className="line-clamp-1">{prog.name}</span>
                            </h2>
                            {(isAdmin || isTrainer) && (
                                <button
                                    onClick={() => setModal({ type: 'addCourse', programId: prog.id })}
                                    className="mt-3 w-full bg-white bg-opacity-20 hover:bg-opacity-30 text-white text-xs font-medium py-1.5 rounded-lg flex items-center justify-center gap-1 transition-colors"
                                >
                                    <Icon name="plus" className="w-3 h-3" /> إضافة دورة
                                </button>
                            )}
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 space-y-3">
                            {prog.courses.map(course => (
                                <CourseCard key={course.id} course={course} programId={prog.id} />
                            ))}
                        </div>
                    </aside>
                );
            };

            // -------------------------------------------------------
            // CourseCard
            // -------------------------------------------------------
            const CourseCard = ({ course, programId }) => {
                const [isOpen, setIsOpen] = useState(false);
                return (
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden transition-all hover:shadow-md">
                        <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={() => setIsOpen(!isOpen)}>
                            <div className="flex justify-between items-start mb-2">
                                <h3 className="font-bold text-medbox-dark text-sm leading-tight ml-4 flex-1">{course.name}</h3>
                                <div className="flex items-center gap-1 shrink-0">
                                    {isAdmin && (
                                        <button
                                            onClick={e => { e.stopPropagation(); handleDeleteCourse(programId, course.id); }}
                                            className="p-1 text-gray-300 hover:text-red-500 transition-colors"
                                            title="حذف الدورة"
                                        >
                                            <Icon name="trash" className="w-3.5 h-3.5" />
                                        </button>
                                    )}
                                    <div className={`transform transition-transform text-gray-400 ${isOpen ? 'rotate-180' : ''}`}>
                                        <Icon name="chevronDown" className="w-4 h-4" />
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center justify-between text-xs text-gray-500">
                                <span className="bg-gray-100 px-2 py-0.5 rounded font-mono">{course.code}</span>
                                <span>{course.date}</span>
                            </div>
                            <div className="text-xs text-gray-600 mt-2 flex items-center gap-1 border-t pt-2">
                                <Icon name="user" className="w-3 h-3 text-medbox-main"/>
                                <span>المشرف: <strong>{course.supervisor}</strong></span>
                            </div>
                        </div>
                        {isOpen && (
                            <div className="bg-gray-50 border-t border-gray-100 p-2 fade-in">
                                <div className="flex items-center justify-between px-2 mb-2">
                                    <p className="text-xs text-gray-400 font-medium">الطلاب ({course.students?.length || 0})</p>
                                    {(isAdmin || isTrainer) && (
                                        <button
                                            onClick={() => setModal({ type: 'addStudent', programId, courseId: course.id })}
                                            className="flex items-center gap-1 text-xs text-medbox-main hover:text-medbox-dark font-medium"
                                        >
                                            <Icon name="plus" className="w-3 h-3" /> إضافة
                                        </button>
                                    )}
                                </div>
                                <ul className="space-y-1">
                                    {(course.students || []).map(student => (
                                        <li key={student.id}
                                            className={`text-sm px-3 py-2 rounded-lg cursor-pointer transition-colors flex items-center justify-between group
                                                ${selectedStudent?.id === student.id ? 'bg-medbox-light text-medbox-dark font-bold' : 'hover:bg-gray-200 text-gray-700'}`}
                                        >
                                            <div className="flex items-center gap-2 flex-1" onClick={() => setSelectedStudent({ ...student, courseName: course.name, courseId: course.id, programId })}>
                                                <div className="w-6 h-6 rounded-full bg-medbox-main text-white flex items-center justify-center text-xs shrink-0">
                                                    {student.name?.charAt(0)}
                                                </div>
                                                <span className="truncate">{student.name}</span>
                                            </div>
                                            {(isAdmin || isTrainer) && (
                                                <button
                                                    onClick={e => { e.stopPropagation(); handleDeleteStudent(programId, course.id, student.id); }}
                                                    className="opacity-0 group-hover:opacity-100 p-1 text-gray-300 hover:text-red-500 transition-all"
                                                >
                                                    <Icon name="trash" className="w-3 h-3" />
                                                </button>
                                            )}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>
                );
            };

            // -------------------------------------------------------
            // لوحة عرض تفاصيل الطالب
            // -------------------------------------------------------
            const StudentDetails = ({ student }) => {
                const [editProgress, setEditProgress] = useState(false);
                const [progressVal, setProgressVal]   = useState(student.progress || 0);
                return (
                    <div className="flex-1 p-6 md:p-8 overflow-y-auto fade-in">
                        <button onClick={() => setSelectedStudent(null)}
                            className="mb-6 flex items-center gap-2 text-gray-500 hover:text-medbox-main font-medium transition-colors text-sm"
                        >
                            <svg className="w-4 h-4 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                            العودة للبرامج
                        </button>

                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="bg-gradient-to-l from-medbox-main to-medbox-dark p-8 text-white flex items-center gap-6">
                                <div className="w-20 h-20 bg-white text-medbox-main rounded-full flex items-center justify-center text-3xl font-bold shadow-lg border-4 border-medbox-light shrink-0">
                                    {student.name?.charAt(0)}
                                </div>
                                <div>
                                    <h2 className="text-2xl font-bold mb-1">{student.name}</h2>
                                    <p className="text-medbox-light text-sm flex items-center gap-2">
                                        <Icon name="book" className="w-4 h-4"/>
                                        {student.courseName}
                                    </p>
                                </div>
                            </div>

                            <div className="p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-4">
                                    <h3 className="text-base font-bold text-gray-800 border-b pb-2">المعلومات الشخصية</h3>
                                    {[
                                        { label: 'رقم الهاتف', value: student.phone, ltr: true },
                                        { label: 'البريد الإلكتروني', value: student.email },
                                        { label: 'المستوى الدراسي', value: student.level },
                                        { label: 'الحالة', value: student.status || 'نشط' },
                                    ].map(({ label, value, ltr }) => (
                                        <div key={label}>
                                            <p className="text-xs text-gray-500 mb-0.5">{label}</p>
                                            <p className={`font-medium text-gray-800 text-sm ${ltr ? 'dir-ltr' : ''}`} dir={ltr ? 'ltr' : undefined}>{value || '—'}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-base font-bold text-gray-800 border-b pb-2">التقدم الأكاديمي</h3>
                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <p className="text-sm text-gray-600 font-medium">نسبة الإنجاز</p>
                                            <span className="text-2xl font-bold text-medbox-main">{student.progress || 0}%</span>
                                        </div>
                                        <div className="w-full bg-gray-200 rounded-full h-3 mb-3">
                                            <div className="bg-medbox-main h-3 rounded-full transition-all duration-700" style={{ width: `${student.progress || 0}%` }}></div>
                                        </div>
                                        {(isAdmin || isTrainer) && (
                                            editProgress ? (
                                                <div className="flex items-center gap-3">
                                                    <input
                                                        type="range" min="0" max="100"
                                                        value={progressVal}
                                                        onChange={e => setProgressVal(+e.target.value)}
                                                        className="flex-1 accent-medbox-main"
                                                    />
                                                    <span className="text-sm font-bold text-medbox-main w-10">{progressVal}%</span>
                                                    <button
                                                        onClick={() => {
                                                            handleUpdateProgress(student.programId, student.courseId, student.id, progressVal);
                                                            setEditProgress(false);
                                                        }}
                                                        className="bg-medbox-main text-white text-xs px-3 py-1.5 rounded-lg"
                                                    >حفظ</button>
                                                    <button onClick={() => setEditProgress(false)} className="text-gray-500 text-xs px-2 py-1.5">إلغاء</button>
                                                </div>
                                            ) : (
                                                <button onClick={() => { setProgressVal(student.progress||0); setEditProgress(true); }}
                                                    className="flex items-center gap-1 text-xs text-medbox-main hover:text-medbox-dark font-medium"
                                                >
                                                    <Icon name="edit" className="w-3.5 h-3.5" /> تعديل التقدم
                                                </button>
                                            )
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // -------------------------------------------------------
            // اللوحة الرئيسية
            // -------------------------------------------------------
            const MainBoard = () => {
                if (activeTab !== 'programs') return (
                    <div className="flex-1 flex items-center justify-center flex-col text-gray-400">
                        <Icon name="book" className="w-20 h-20 mb-4 opacity-30" />
                        <h2 className="text-xl">{activeTab === 'skills' ? 'المهارات السريرية' : 'الكتب والأبحاث'}</h2>
                        <p className="mt-2 text-sm">قريباً...</p>
                    </div>
                );
                if (selectedStudent) return <StudentDetails student={selectedStudent} />;
                return (
                    <div className="flex-1 p-6 md:p-8 overflow-y-auto fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">البرامج التدريبية</h2>
                                <p className="text-gray-500 mt-1 text-sm">
                                    {isAdmin ? 'جميع البرامج — صلاحيات كاملة' : 'برامجك المخصصة'}
                                </p>
                            </div>
                            {isAdmin && (
                                <button
                                    onClick={() => setModal({ type: 'addProgram' })}
                                    className="flex items-center gap-2 bg-medbox-main hover:bg-medbox-dark text-white px-5 py-2.5 rounded-xl font-medium transition-colors text-sm shadow-sm"
                                >
                                    <Icon name="plus" className="w-4 h-4" />
                                    برنامج جديد
                                </button>
                            )}
                        </div>

                        {visiblePrograms.length === 0 ? (
                            <div className="text-center py-20 text-gray-400">
                                <Icon name="book" className="w-16 h-16 mx-auto mb-4 opacity-30" />
                                <p>لا توجد برامج متاحة</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {visiblePrograms.map(program => (
                                    <div key={program.id}
                                        onClick={() => { setSelectedProgram(program); setSelectedStudent(null); }}
                                        className={`bg-white rounded-2xl p-6 shadow-sm border-2 cursor-pointer transition-all hover:shadow-lg hover:-translate-y-0.5 transform
                                            ${selectedProgram?.id === program.id ? 'border-medbox-main ring-4 ring-medbox-light' : 'border-transparent'}`}
                                    >
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="w-12 h-12 bg-medbox-light text-medbox-main rounded-xl flex items-center justify-center">
                                                <Icon name="stethoscope" className="w-6 h-6" />
                                            </div>
                                            {isAdmin && (
                                                <button
                                                    onClick={e => { e.stopPropagation(); handleDeleteProgram(program.id); }}
                                                    className="p-1.5 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                                >
                                                    <Icon name="trash" className="w-4 h-4" />
                                                </button>
                                            )}
                                        </div>
                                        <h3 className="text-base font-bold text-gray-800 mb-2">{program.name}</h3>
                                        <p className="text-gray-500 text-sm leading-relaxed mb-4 line-clamp-2">{program.description}</p>
                                        <div className="flex items-center justify-between pt-4 border-t border-gray-100">
                                            <span className="text-xs font-bold text-medbox-main bg-medbox-light px-3 py-1 rounded-full">
                                                {program.courses?.length || 0} دورات
                                            </span>
                                            <span className="text-medbox-main text-sm font-medium flex items-center gap-1">
                                                عرض <Icon name="chevronLeft" className="w-4 h-4" />
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            // -------------------------------------------------------
            // Modal (نوافذ الإضافة)
            // -------------------------------------------------------
            const Modal = () => {
                const [form, setForm] = useState({});
                if (!modal) return null;

                const handleSubmit = (e) => {
                    e.preventDefault();
                    if (modal.type === 'addProgram')  handleAddProgram(form);
                    if (modal.type === 'addCourse')   handleAddCourse(modal.programId, form);
                    if (modal.type === 'addStudent')  handleAddStudent(modal.programId, modal.courseId, form);
                };

                const fields = {
                    addProgram: [
                        { key: 'name',        label: 'اسم البرنامج',   required: true  },
                        { key: 'description', label: 'وصف البرنامج',   textarea: true  },
                    ],
                    addCourse: [
                        { key: 'name',       label: 'اسم الدورة',   required: true },
                        { key: 'code',       label: 'رمز الدورة',   placeholder: 'IM-CAR-01' },
                        { key: 'date',       label: 'تاريخ البدء',  type: 'date' },
                        { key: 'supervisor', label: 'اسم المشرف'                },
                    ],
                    addStudent: [
                        { key: 'name',  label: 'اسم المتدرب',       required: true },
                        { key: 'phone', label: 'رقم الهاتف',         type: 'tel'    },
                        { key: 'email', label: 'البريد الإلكتروني',  type: 'email'  },
                        { key: 'level', label: 'المستوى الدراسي',    placeholder: 'السنة الأولى' },
                    ],
                };

                const titles = { addProgram: 'إضافة برنامج جديد', addCourse: 'إضافة دورة جديدة', addStudent: 'إضافة متدرب جديد' };

                return (
                    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md fade-in">
                            <div className="flex items-center justify-between p-6 border-b border-gray-100">
                                <h3 className="font-bold text-gray-800">{titles[modal.type]}</h3>
                                <button onClick={() => setModal(null)} className="text-gray-400 hover:text-gray-600 text-xl font-light">✕</button>
                            </div>
                            <form onSubmit={handleSubmit} className="p-6 space-y-4">
                                {fields[modal.type]?.map(({ key, label, required, textarea, type, placeholder }) => (
                                    <div key={key}>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">{label}{required && <span className="text-red-500 mr-1">*</span>}</label>
                                        {textarea ? (
                                            <textarea
                                                rows={3}
                                                value={form[key] || ''}
                                                onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                                                className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main resize-none"
                                            />
                                        ) : (
                                            <input
                                                type={type || 'text'}
                                                required={required}
                                                placeholder={placeholder}
                                                value={form[key] || ''}
                                                onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                                                className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main"
                                            />
                                        )}
                                    </div>
                                ))}
                                <div className="flex gap-3 pt-2">
                                    <button type="submit" disabled={loading}
                                        className="flex-1 bg-medbox-main hover:bg-medbox-dark text-white font-bold py-2.5 rounded-xl transition-colors disabled:opacity-60"
                                    >
                                        {loading ? 'جاري الحفظ...' : 'حفظ'}
                                    </button>
                                    <button type="button" onClick={() => setModal(null)}
                                        className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-xl transition-colors"
                                    >
                                        إلغاء
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col w-full relative">
                    <Navbar />
                    <div className="flex-1 flex overflow-hidden">
                        <Sidebar />
                        <MainBoard />
                    </div>
                    <Modal />
                </div>
            );
        };

        // ===========================================================
        // Root — إدارة المصادقة والتوجيه
        // ===========================================================
        const Root = () => {
            const [fbReady, setFbReady]           = useState(!!window._firebaseReady);
            const [isConfigured, setIsConfigured] = useState(false);
            const [authState, setAuthState]       = useState('loading'); // loading | loggedOut | loggedIn
            const [currentUser, setCurrentUser]   = useState(null);
            const [userProfile, setUserProfile]   = useState(null);
            const [programs, setPrograms]         = useState([]);
            const [dataLoading, setDataLoading]   = useState(false);
            const [toast, setToast]               = useState('');

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3500);
            };

            // انتظار تهيئة Firebase
            useEffect(() => {
                if (window._firebaseReady) {
                    setFbReady(true);
                } else {
                    window.addEventListener('firebase-ready', () => setFbReady(true), { once: true });
                }
            }, []);

            // التحقق من إعدادات Firebase
            useEffect(() => {
                if (!fbReady) return;
                const { auth } = window._firebase;
                // إذا كانت الإعدادات وهمية سنلاحظه من خلال خطأ الـ auth
                setIsConfigured(!auth.config?.apiKey?.includes('PASTE_YOUR'));
            }, [fbReady]);

            // مراقبة حالة تسجيل الدخول
            useEffect(() => {
                if (!fbReady || !isConfigured) return;
                const { auth, db, onAuthStateChanged, getDoc, doc } = window._firebase;
                const unsub = onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        setCurrentUser(user);
                        // جلب بروفايل المستخدم من Firestore
                        try {
                            const snap = await getDoc(doc(db, 'users', user.uid));
                            if (snap.exists()) {
                                setUserProfile(snap.data());
                                setAuthState('loggedIn');
                            } else {
                                // مستخدم موجود في Auth لكن بدون دور — عامله كطالب
                                setUserProfile({ role: 'student' });
                                setAuthState('loggedIn');
                            }
                        } catch (e) {
                            setUserProfile({ role: 'student' });
                            setAuthState('loggedIn');
                        }
                    } else {
                        setCurrentUser(null);
                        setUserProfile(null);
                        setAuthState('loggedOut');
                    }
                });
                return () => unsub();
            }, [fbReady, isConfigured]);

            // جلب البرامج من Firestore
            useEffect(() => {
                if (authState !== 'loggedIn') return;
                const { db, collection, getDocs } = window._firebase;
                setDataLoading(true);
                getDocs(collection(db, 'programs'))
                    .then(snap => {
                        const progs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                        setPrograms(progs);
                    })
                    .catch(e => showToast('خطأ في جلب البيانات: ' + e.message))
                    .finally(() => setDataLoading(false));
            }, [authState]);

            const handleLogout = async () => {
                const { auth, signOut } = window._firebase;
                await signOut(auth);
            };

            // --- عرض الشاشات ---
            if (!fbReady) return <LoadingScreen message="جاري تحميل Firebase..." />;
            if (!isConfigured) return <SetupScreen />;
            if (authState === 'loading') return <LoadingScreen message="جاري التحقق من الجلسة..." />;
            if (authState === 'loggedOut') return <LoginScreen />;
            if (dataLoading) return <LoadingScreen message="جاري تحميل البيانات..." />;

            return (
                <div className="h-full flex flex-col relative">
                    {userProfile?.role === 'student' ? (
                        <StudentPortal
                            currentUser={currentUser}
                            programs={programs}
                            onLogout={handleLogout}
                        />
                    ) : (
                        <MainApp
                            currentUser={currentUser}
                            userProfile={userProfile}
                            programs={programs}
                            setPrograms={setPrograms}
                            onLogout={handleLogout}
                            showToast={showToast}
                        />
                    )}

                    {/* Toast */}
                    {toast && (
                        <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50 fade-in text-sm whitespace-nowrap">
                            <Icon name="shield" className="w-4 h-4 text-medbox-main" />
                            {toast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
