<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBox-Education</title>
    
    <!-- خطوط جوجل (Tajawal) لدعم اللغة العربية بشكل جميل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- إعدادات Tailwind للخطوط والألوان -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        medbox: {
                            dark: '#0f6b7a',
                            main: '#138496',
                            light: '#e0f2f4',
                            accent: '#f39c12'
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (لتحويل JSX في المتصفح) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- أيقونات Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* تخصيص شريط التمرير (Scrollbar) ليناسب التصميم */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #138496; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0f6b7a; 
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen overflow-hidden flex flex-col font-sans">
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- البيانات الوهمية الأولية ---
        const initialData = {
            programs: [
                {
                    id: 1,
                    name: "البورد العربي للأمراض الباطنة",
                    description: "برنامج تدريبي شامل معتمد يغطي كافة فروع الطب الباطني والممارسات السريرية المتقدمة.",
                    icon: "stethoscope",
                    courses: [
                        {
                            id: 101,
                            name: "دورة أمراض القلب والأوعية الدموية",
                            code: "IM-CAR-01",
                            date: "2026/08/15",
                            supervisor: "د. أحمد العوضي",
                            students: [
                                { id: 1001, name: "حسام كمال جهجاه", phone: "0551234567", email: "husam@example.com", status: "نشط", progress: 85, level: "السنة الثانية" },
                                { id: 1002, name: "حلا قصيص", phone: "0559876543", email: "hala@example.com", status: "مكتمل", progress: 100, level: "السنة الرابعة" }
                            ]
                        },
                        {
                            id: 102,
                            name: "دورة العناية المركزة (ICU)",
                            code: "IM-ICU-02",
                            date: "2026/09/01",
                            supervisor: "د. تحسين النجار",
                            students: [
                                { id: 1003, name: "أحمد بن حنبل", phone: "0501122334", email: "ahmad@example.com", status: "نشط", progress: 40, level: "السنة الأولى" }
                            ]
                        }
                    ]
                },
                {
                    id: 2,
                    name: "دبلوم طب الطوارئ والإسعاف",
                    description: "تدريب مكثف على التعامل مع الحالات الحرجة والإسعافات الأولية المتقدمة (ATLS, ACLS).",
                    icon: "activity",
                    courses: [
                        {
                            id: 201,
                            name: "دعم الحياة المتقدم (ACLS)",
                            code: "EM-ACLS-05",
                            date: "2026/07/20",
                            supervisor: "د. هاني سعيد",
                            students: [
                                { id: 2001, name: "ياسر المصري", phone: "0566677889", email: "yaser@example.com", status: "نشط", progress: 60, level: "السنة الثالثة" }
                            ]
                        }
                    ]
                }
            ]
        };

        // --- المكونات (Components) ---

        // 1. أيقونات مخصصة باستخدام SVG
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                book: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
                stethoscope: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>,
                activity: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
                settings: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
                sync: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
                bell: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>,
                qr: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>,
                login: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>,
                user: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
                download: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
                upload: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
                chevronDown: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>,
                chevronLeft: <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>,
            };
            return icons[name] || null;
        };

        const App = () => {
            // --- حالات التطبيق (State) ---
            const [data, setData] = useState(initialData);
            const [activeTab, setActiveTab] = useState('programs'); // programs, skills, books
            const [selectedProgram, setSelectedProgram] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [toastMessage, setToastMessage] = useState('');

            // --- التخزين المحلي (LocalStorage) ---
            useEffect(() => {
                const savedData = localStorage.getItem('medbox_data');
                if (savedData) {
                    try {
                        setData(JSON.parse(savedData));
                    } catch (e) {
                        console.error("Error parsing local data", e);
                    }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('medbox_data', JSON.stringify(data));
            }, [data]);

            // --- دوال مساعدة للتنبيهات ---
            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3000);
            };

            // --- دوال حفظ وتصدير البيانات ---
            const handleSyncDrive = () => {
                // محاكاة المزامنة مع غوغل درايف
                showToast('جاري المزامنة مع Google Drive...');
                setTimeout(() => {
                    showToast('تمت المزامنة بنجاح وحفظ البيانات بصيغة JSON على Drive.');
                }, 1500);
            };

            const handleExportJSON = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "medbox_backup.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                showToast('تم تصدير البيانات بنجاح.');
            };

            const handleImportJSON = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (importedData && importedData.programs) {
                            setData(importedData);
                            showToast('تم استيراد البيانات بنجاح.');
                            setSelectedProgram(null);
                            setSelectedStudent(null);
                        } else {
                            showToast('ملف JSON غير صالح.');
                        }
                    } catch (err) {
                        showToast('حدث خطأ أثناء قراءة الملف.');
                    }
                };
                reader.readAsText(file);
            };

            // --- التفاعلات ---
            const handleProgramClick = (program) => {
                setSelectedProgram(program);
                setSelectedStudent(null); // إعادة تعيين الطالب عند تغيير البرنامج
            };

            const handleStudentClick = (student, courseName) => {
                setSelectedStudent({ ...student, courseName });
            };

            const handleNavClick = (tab) => {
                setActiveTab(tab);
                if (tab === 'programs') {
                    setSelectedStudent(null);
                    // لا نقوم بتفريغ البرنامج المحدد لنبقي القائمة الجانبية مفتوحة كما طلب
                }
            };

            // --- مكون شريط الأدوات العلوي ---
            const Navbar = () => (
                <nav className="bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-6 py-3 shrink-0 z-10 relative">
                    {/* اليمين: الشعار والتبويبات */}
                    <div className="flex items-center gap-8">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => handleNavClick('programs')}>
                            <div className="bg-medbox-main text-white p-2 rounded-lg">
                                <Icon name="activity" />
                            </div>
                            <h1 className="text-xl font-bold text-medbox-dark tracking-wide">MedBox<span className="font-light text-gray-500">-Education</span></h1>
                        </div>
                        
                        <div className="hidden md:flex items-center gap-1 bg-gray-100 rounded-lg p-1">
                            <button 
                                onClick={() => handleNavClick('programs')}
                                className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'programs' ? 'bg-white text-medbox-main shadow-sm' : 'text-gray-600 hover:text-medbox-main'}`}
                            >
                                البرامج التدريبية
                            </button>
                            <button 
                                onClick={() => handleNavClick('skills')}
                                className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'skills' ? 'bg-white text-medbox-main shadow-sm' : 'text-gray-600 hover:text-medbox-main'}`}
                            >
                                المهارات السريرية
                            </button>
                            <button 
                                onClick={() => handleNavClick('books')}
                                className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${activeTab === 'books' ? 'bg-white text-medbox-main shadow-sm' : 'text-gray-600 hover:text-medbox-main'}`}
                            >
                                كتب وأبحاث علمية
                            </button>
                        </div>
                    </div>

                    {/* اليسار: أدوات التحكم */}
                    <div className="flex items-center gap-3">
                        <div className="flex items-center gap-2 border-l pl-4 border-gray-200">
                            <button onClick={handleSyncDrive} title="مزامنة مع Google Drive" className="p-2 text-gray-500 hover:text-medbox-main hover:bg-medbox-light rounded-full transition-colors">
                                <Icon name="sync" />
                            </button>
                            <button title="الإشعارات" className="p-2 text-gray-500 hover:text-medbox-main hover:bg-medbox-light rounded-full transition-colors relative">
                                <Icon name="bell" />
                                <span className="absolute top-1 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                            </button>
                            <button title="مسح QR Code" className="p-2 text-gray-500 hover:text-medbox-main hover:bg-medbox-light rounded-full transition-colors">
                                <Icon name="qr" />
                            </button>
                            <button title="الإعدادات" className="p-2 text-gray-500 hover:text-medbox-main hover:bg-medbox-light rounded-full transition-colors">
                                <Icon name="settings" />
                            </button>
                        </div>
                        <button className="flex items-center gap-2 bg-medbox-main hover:bg-medbox-dark text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm shadow-sm">
                            <Icon name="login" className="w-4 h-4" />
                            <span>تسجيل الدخول</span>
                        </button>
                    </div>
                </nav>
            );

            // --- مكون القائمة الجانبية (للدورات والطلاب) ---
            const Sidebar = () => {
                if (!selectedProgram) {
                    return (
                        <aside className="w-80 bg-white border-l border-gray-200 flex flex-col p-6 items-center justify-center text-center shadow-inner">
                            <Icon name="book" className="w-16 h-16 text-gray-300 mb-4" />
                            <h3 className="text-gray-500 font-medium">يرجى اختيار برنامج تدريبي من اللوحة الرئيسية لعرض دوراته هنا.</h3>
                        </aside>
                    );
                }

                return (
                    <aside className="w-80 bg-gray-50 border-l border-gray-200 flex flex-col h-full overflow-hidden shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)]">
                        <div className="bg-medbox-main text-white p-5 shrink-0 shadow-md">
                            <h2 className="text-lg font-bold flex items-center gap-2">
                                <Icon name="activity" />
                                {selectedProgram.name}
                            </h2>
                            <p className="text-medbox-light text-xs mt-2 opacity-90">الدورات المنجزة والمتاحة</p>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {selectedProgram.courses.map(course => (
                                <CourseCard key={course.id} course={course} />
                            ))}
                        </div>
                    </aside>
                );
            };

            // --- مكون بطاقة الدورة (مع القائمة المنسدلة للطلاب) ---
            const CourseCard = ({ course }) => {
                const [isOpen, setIsOpen] = useState(false);

                return (
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden transition-all hover:shadow-md">
                        <div 
                            className="p-4 cursor-pointer hover:bg-gray-50 transition-colors relative"
                            onClick={() => setIsOpen(!isOpen)}
                        >
                            <div className="flex justify-between items-start mb-2">
                                <h3 className="font-bold text-medbox-dark text-sm leading-tight ml-4">{course.name}</h3>
                                <div className={`transform transition-transform text-gray-400 ${isOpen ? 'rotate-180' : ''}`}>
                                    <Icon name="chevronDown" className="w-4 h-4" />
                                </div>
                            </div>
                            <div className="space-y-1 mt-3">
                                <div className="flex items-center justify-between text-xs text-gray-500">
                                    <span className="bg-gray-100 px-2 py-1 rounded text-gray-600 font-mono">{course.code}</span>
                                    <span className="flex items-center gap-1"><Icon name="book" className="w-3 h-3"/> {course.date}</span>
                                </div>
                                <div className="text-xs text-gray-600 mt-2 flex items-center gap-1 border-t pt-2">
                                    <Icon name="user" className="w-3 h-3 text-medbox-main"/> المشرف: <strong>{course.supervisor}</strong>
                                </div>
                            </div>
                        </div>
                        
                        {/* قائمة الطلاب المنسدلة */}
                        {isOpen && (
                            <div className="bg-gray-50 border-t border-gray-100 p-2 fade-in">
                                <p className="text-xs text-gray-400 mb-2 px-2 font-medium">الطلاب المسجلين ({course.students.length}):</p>
                                <ul className="space-y-1">
                                    {course.students.map(student => (
                                        <li 
                                            key={student.id}
                                            onClick={() => handleStudentClick(student, course.name)}
                                            className={`text-sm px-3 py-2 rounded-lg cursor-pointer transition-colors flex items-center justify-between ${selectedStudent?.id === student.id ? 'bg-medbox-light text-medbox-dark font-bold' : 'hover:bg-gray-200 text-gray-700'}`}
                                        >
                                            <div className="flex items-center gap-2">
                                                <div className="w-6 h-6 rounded-full bg-medbox-main text-white flex items-center justify-center text-xs">
                                                    {student.name.charAt(0)}
                                                </div>
                                                {student.name}
                                            </div>
                                            <Icon name="chevronLeft" className="w-3 h-3 opacity-50" />
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>
                );
            };

            // --- لوحة العرض الرئيسية ---
            const MainBoard = () => {
                if (activeTab !== 'programs') {
                    return (
                        <div className="flex-1 flex items-center justify-center flex-col text-gray-400">
                            <Icon name="book" className="w-20 h-20 mb-4 opacity-50" />
                            <h2 className="text-xl">قسم {activeTab === 'skills' ? 'المهارات السريرية' : 'الكتب والأبحاث'}</h2>
                            <p className="mt-2">قريباً...</p>
                        </div>
                    );
                }

                if (selectedStudent) {
                    return <StudentDetails student={selectedStudent} />;
                }

                return (
                    <div className="flex-1 p-8 overflow-y-auto fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">البرامج التدريبية المتاحة</h2>
                                <p className="text-gray-500 mt-1 text-sm">اختر برنامجاً لعرض تفاصيله والدورات التابعة له في القائمة الجانبية.</p>
                            </div>
                            
                            {/* أزرار استيراد وتصدير البيانات */}
                            <div className="flex gap-2">
                                <label className="cursor-pointer bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm transition-colors">
                                    <Icon name="upload" className="w-4 h-4 text-medbox-main" />
                                    <span>استيراد JSON</span>
                                    <input type="file" accept=".json" onChange={handleImportJSON} className="hidden" />
                                </label>
                                <button onClick={handleExportJSON} className="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 shadow-sm transition-colors">
                                    <Icon name="download" className="w-4 h-4 text-medbox-main" />
                                    <span>تصدير JSON</span>
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {data.programs.map(program => (
                                <div 
                                    key={program.id} 
                                    onClick={() => handleProgramClick(program)}
                                    className={`bg-white rounded-2xl p-6 shadow-sm border-2 cursor-pointer transition-all hover:shadow-lg transform hover:-translate-y-1 ${selectedProgram?.id === program.id ? 'border-medbox-main ring-4 ring-medbox-light' : 'border-transparent'}`}
                                >
                                    <div className="w-12 h-12 bg-medbox-light text-medbox-main rounded-xl flex items-center justify-center mb-4">
                                        <Icon name={program.icon} className="w-6 h-6" />
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-800 mb-2">{program.name}</h3>
                                    <p className="text-gray-500 text-sm leading-relaxed mb-4">{program.description}</p>
                                    
                                    <div className="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                                        <span className="text-xs font-bold text-medbox-main bg-medbox-light px-3 py-1 rounded-full">
                                            {program.courses.length} دورات
                                        </span>
                                        <span className="text-medbox-main text-sm font-medium flex items-center gap-1">
                                            عرض <Icon name="chevronLeft" className="w-4 h-4" />
                                        </span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // --- تفاصيل الطالب ---
            const StudentDetails = ({ student }) => (
                <div className="flex-1 p-8 overflow-y-auto fade-in">
                    <button 
                        onClick={() => setSelectedStudent(null)}
                        className="mb-6 flex items-center gap-2 text-gray-500 hover:text-medbox-main font-medium transition-colors"
                    >
                        <svg className="w-4 h-4 transform rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                        العودة للبرامج
                    </button>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        {/* ترويسة بطاقة الطالب */}
                        <div className="bg-gradient-to-r from-medbox-main to-medbox-dark p-8 text-white flex items-center gap-6">
                            <div className="w-24 h-24 bg-white text-medbox-main rounded-full flex items-center justify-center text-4xl font-bold shadow-lg border-4 border-medbox-light">
                                {student.name.charAt(0)}
                            </div>
                            <div>
                                <h2 className="text-3xl font-bold mb-1">{student.name}</h2>
                                <p className="text-medbox-light flex items-center gap-2">
                                    <Icon name="book" className="w-4 h-4"/> 
                                    مسجل في: {student.courseName}
                                </p>
                            </div>
                        </div>

                        {/* معلومات الطالب */}
                        <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-6">
                                <h3 className="text-lg font-bold text-gray-800 border-b pb-2">المعلومات الشخصية</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <p className="text-sm text-gray-500">رقم الهاتف</p>
                                        <p className="font-medium text-gray-800" dir="ltr">{student.phone}</p>
                                    </div>
                                    <div>
                                        <p className="text-sm text-gray-500">البريد الإلكتروني</p>
                                        <p className="font-medium text-gray-800">{student.email}</p>
                                    </div>
                                    <div>
                                        <p className="text-sm text-gray-500">المستوى الدراسي</p>
                                        <p className="font-medium text-gray-800 bg-gray-100 inline-block px-2 py-1 rounded">{student.level}</p>
                                    </div>
                                    <div>
                                        <p className="text-sm text-gray-500">الحالة</p>
                                        <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold mt-1 ${student.status === 'نشط' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                                            {student.status}
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <h3 className="text-lg font-bold text-gray-800 border-b pb-2">التقدم الأكاديمي</h3>
                                <div>
                                    <div className="flex justify-between items-end mb-2">
                                        <p className="font-medium text-gray-700">نسبة إنجاز الدورة</p>
                                        <span className="text-2xl font-bold text-medbox-main">{student.progress}%</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-3">
                                        <div className="bg-medbox-main h-3 rounded-full transition-all duration-1000" style={{ width: `${student.progress}%` }}></div>
                                    </div>
                                </div>
                                <div className="bg-blue-50 border border-blue-100 rounded-lg p-4 mt-4">
                                    <p className="text-sm text-blue-800 flex items-start gap-2">
                                        <Icon name="activity" className="w-5 h-5 shrink-0" />
                                        <span>أداء الطالب ممتاز في التقييمات السريرية الأخيرة. يحتاج للتركيز على المراجعات النظرية القادمة.</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // --- الهيكل الرئيسي ---
            return (
                <div className="h-full flex flex-col w-full relative">
                    <Navbar />
                    
                    <div className="flex-1 flex overflow-hidden">
                        {/* القائمة الجانبية على اليمين (بسبب RTL) */}
                        <Sidebar />
                        
                        {/* لوحة العرض الرئيسية على اليسار */}
                        <MainBoard />
                    </div>

                    {/* رسائل التنبيه (Toast) */}
                    {toastMessage && (
                        <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50 fade-in">
                            <Icon name="sync" className="w-5 h-5 text-medbox-main" />
                            <span>{toastMessage}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
