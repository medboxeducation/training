        ::-webkit-scrollbar { width: 6px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }

        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #e0f2f4;
            border-top-color: #0790AC;

            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== نظام أزرار موحّد ===== */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 0.4rem; font-family: 'Cairo', sans-serif; font-weight: 600;
            border-radius: 10px; transition: all 0.18s ease; cursor: pointer;
            border: none; outline: none;
        }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .btn:focus-visible { box-shadow: 0 0 0 3px rgba(7,144,172,0.35); }

        /* الحجوم */
        .btn-sm  { font-size: 0.75rem;  padding: 0.35rem 0.85rem; }
        .btn-md  { font-size: 0.85rem;  padding: 0.55rem 1.1rem;  }
        .btn-lg  { font-size: 0.95rem;  padding: 0.7rem 1.5rem;   }
        .btn-icon { padding: 0.5rem; border-radius: 8px; }

        /* الأنواع */
        .btn-primary   { background: #0790AC; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #0f6b7a; box-shadow: 0 4px 12px rgba(7,144,172,0.3); }

        .btn-secondary { background: #e0f2f4; color: #0f6b7a; }
        .btn-secondary:hover:not(:disabled) { background: #c7eaef; }

        .btn-ghost { background: transparent; color: #6b7280; }
        .btn-ghost:hover:not(:disabled) { background: #f3f4f6; color: #374151; }

        .btn-danger-ghost { background: transparent; color: #d1d5db; }
        .btn-danger-ghost:hover:not(:disabled) { background: #fef2f2; color: #ef4444; }

        .btn-white-ghost { background: rgba(255,255,255,0.15); color: #fff; }
        .btn-white-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.25); }

        .btn-neutral { background: #f3f4f6; color: #374151; }
        .btn-neutral:hover:not(:disabled) { background: #e5e7eb; }

        /* FAB — زر إضافة عائم */
        .btn-fab {
            position: fixed; bottom: 2rem; left: 2rem;
            width: 3.25rem; height: 3.25rem;
            background: #0790AC; color: #fff;
            border-radius: 50%; font-size: 1.5rem; font-weight: 400;
            box-shadow: 0 6px 20px rgba(7,144,172,0.45);
            z-index: 40;
        }
        .btn-fab:hover { background: #0f6b7a; box-shadow: 0 8px 24px rgba(7,144,172,0.55); transform: scale(1.06); }

        /* Sidebar header search expand */
        .sidebar-search-input {
            width: 0; opacity: 0; overflow: hidden;
            transition: width 0.3s ease, opacity 0.2s ease;
            background: rgba(255,255,255,0.15);
            border: none; outline: none;
            color: #fff; font-family: 'Cairo', sans-serif;
            font-size: 0.8rem; border-radius: 6px;
            padding: 0;
        }
        .sidebar-search-input::placeholder { color: rgba(255,255,255,0.6); }
        .sidebar-search-input.expanded { width: 130px; opacity: 1; padding: 0.3rem 0.6rem; }

        // ===========================================================

        // ===========================================================

        // ===========================================================
        // شاشة التحميل
        // ===========================================================
        const LoadingScreen = ({ message = 'جاري التحميل...' }) => (

        // ===========================================================

        const StudentPortal = ({ currentUser, programs, onLogout }) => {

            const myEnrollments = [];
            programs.forEach(prog => {
                prog.courses.forEach(course => {
                    const me = course.students.find(s => s.uid === currentUser.uid || s.email === currentUser.email);

            return (
                <div className="h-full flex flex-col">

                    <div className="flex-1 overflow-y-auto p-6 md:p-8 fade-in">

                        {myEnrollments.length === 0 ? (

                                                <div className="w-full bg-gray-200 rounded-full h-2.5">

        // ===========================================================
        // التطبيق الرئيسي (مدير + مدرب)
        // ===========================================================
        const MainApp = ({ currentUser, userProfile, programs, setPrograms, onLogout, showToast }) => {
            const [activeTab, setActiveTab]         = useState('programs');
            const [selectedProgram, setSelectedProgram] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [modal, setModal]                 = useState(null); // { type, data }
            const [loading, setLoading]             = useState(false);
            const [sidebarOpen, setSidebarOpen]     = useState(true);
            const [programDetails, setProgramDetails] = useState(null); // برنامج لعرض تفاصيله الكاملة
            const [settingsPanelOpen, setSettingsPanelOpen] = useState(false);
            const [settingsTab, setSettingsTab]     = useState('about');

            const fb = window._firebase;
            const isAdmin   = userProfile.role === 'admin';
            const isTrainer = userProfile.role === 'trainer';

            // فلترة البرامج حسب الدور
            const visiblePrograms = isAdmin
                ? programs
                : programs.map(prog => ({
                    ...prog,
                    courses: prog.courses.filter(c =>
                        (userProfile.assignedCourseIds || []).includes(c.id)
                    )
                  })).filter(p => p.courses.length > 0);

            // -------------------------------------------------------
            // CRUD — برامج
            // -------------------------------------------------------
            const handleAddProgram = async (formData) => {
                setLoading(true);
                try {
                    const newProg = { ...formData, courses: [], createdAt: fb.serverTimestamp() };
                    const ref = await fb.addDoc(fb.collection(fb.db, 'programs'), newProg);
                    setPrograms(prev => [...prev, { ...newProg, id: ref.id, courses: [] }]);
                    showToast('تمت إضافة البرنامج بنجاح ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteProgram = async (programId) => {
                if (!confirm('هل أنت متأكد من حذف هذا البرنامج وجميع دوراته؟')) return;
                setLoading(true);
                try {
                    await fb.deleteDoc(fb.doc(fb.db, 'programs', programId));
                    setPrograms(prev => prev.filter(p => p.id !== programId));
                    if (selectedProgram?.id === programId) setSelectedProgram(null);
                    showToast('تم حذف البرنامج ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleEditProgram = async (programId, formData) => {
                setLoading(true);
                try {
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), formData);
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, ...formData } : p));
                    if (selectedProgram?.id === programId) setSelectedProgram(p => ({ ...p, ...formData }));
                    if (programDetails?.id === programId) setProgramDetails(p => ({ ...p, ...formData }));
                    showToast('تم تحديث البرنامج ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // -------------------------------------------------------
            // CRUD — دورات
            // -------------------------------------------------------
            const handleAddCourse = async (programId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const existingCourses = prog.courses || [];

                    // ===== توليد رمز الدورة تلقائياً =====
                    // أول حرفين من الاسم الإنجليزي للبرنامج
                    const enName = (prog.nameEn || prog.name || 'XX').trim();
                    const prefix = (enName.replace(/[^a-zA-Z]/g, '').slice(0, 2) || 'XX').toUpperCase().padEnd(2, 'X');

                    // تاريخ الدورة (YYYYMMDD) أو تاريخ اليوم إن لم يحدد
                    const dateStr = (formData.date || new Date().toISOString().slice(0,10)).replace(/-/g, '');

                    // رقم تسلسلي غير مكرر
                    let seq = existingCourses.length + 1;
                    let code;
                    do {
                        code = `${prefix}-${dateStr}-${String(seq).padStart(2, '0')}`;
                        seq++;
                    } while (existingCourses.some(c => c.code === code));

                    const newCourse = { ...formData, code, id: Date.now(), students: [] };
                    const updatedCourses = [...existingCourses, newCourse];
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p =>
                        p.id === programId ? { ...p, courses: updatedCourses } : p
                    ));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast(`تمت إضافة الدورة ✓ — رمز الدورة: ${code}`);
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteCourse = async (programId, courseId) => {
                if (!confirm('هل أنت متأكد من حذف هذه الدورة؟')) return;
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.filter(c => c.id !== courseId);
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p =>
                        p.id === programId ? { ...p, courses: updatedCourses } : p
                    ));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم حذف الدورة ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleEditCourse = async (programId, courseId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => c.id === courseId ? { ...c, ...formData } : c);
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم تحديث الدورة ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // -------------------------------------------------------
            // CRUD — طلاب
            // -------------------------------------------------------
            const handleAddStudent = async (programId, courseId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: [...(c.students||[]), { ...formData, id: Date.now(), progress: 0, status: 'نشط' }] };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تمت إضافة المتدرب ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteStudent = async (programId, courseId, studentId) => {
                if (!confirm('هل أنت متأكد من حذف هذا المتدرب؟')) return;
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: c.students.filter(s => s.id !== studentId) };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    if (selectedStudent?.id === studentId) setSelectedStudent(null);
                    showToast('تم حذف المتدرب ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleUpdateProgress = async (programId, courseId, studentId, newProgress) => {
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: c.students.map(s => s.id === studentId ? { ...s, progress: newProgress } : s) };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم تحديث التقدم ✓');

                        {/* زر الإعدادات (مسنن) */}

                        >
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                        {/* معلومات المستخدم: أفاتار + إيميل + الصلاحية تحته */}
                        <div className="flex items-center gap-2 text-sm text-gray-600 border-r pr-3 border-gray-200">
                            <div className="w-8 h-8 bg-medbox-main text-white rounded-full flex items-center justify-center font-bold text-sm shrink-0">
                                {currentUser.email?.charAt(0).toUpperCase()}
                            </div>
                            <div className="hidden md:flex flex-col leading-tight">
                                <span className="text-xs text-gray-700 font-medium">{currentUser.email}</span>
                                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full self-start mt-0.5 ${roleBadge.color}`}>{roleBadge.label}</span>
                            </div>

                        <button onClick={onLogout} title="تسجيل الخروج" className="btn btn-icon btn-ghost text-gray-500 hover:text-red-500">

                        </button>
                    </div>
                </nav>
            );

            // -------------------------------------------------------
            // Sidebar
            // -------------------------------------------------------
            const Sidebar = () => {
                const [searchOpen, setSearchOpen] = React.useState(false);
                const [searchQuery, setSearchQuery] = React.useState('');
                const [sortOrder, setSortOrder] = React.useState('default'); // default | az | newest | oldest
                const [sortMenuOpen, setSortMenuOpen] = React.useState(false);
                const searchInputRef = React.useRef(null);

                React.useEffect(() => {
                    if (searchOpen && searchInputRef.current) searchInputRef.current.focus();
                    if (!searchOpen) setSearchQuery('');
                }, [searchOpen]);

                const sortOptions = [
                    { key: 'default', label: 'الترتيب الافتراضي' },
                    { key: 'az',      label: 'أبجدي (أ → ي)' },
                    { key: 'za',      label: 'أبجدي (ي → أ)' },
                    { key: 'newest',  label: 'الأحدث أولاً' },
                    { key: 'oldest',  label: 'الأقدم أولاً' },
                ];
                const currentSortLabel = sortOptions.find(s => s.key === sortOrder)?.label || 'الترتيب';

                const getSortedAndFilteredCourses = (courses) => {
                    let result = [...(courses || [])];
                    if (searchQuery.trim()) {
                        const q = searchQuery.trim().toLowerCase();
                        result = result.filter(c =>
                            c.name?.toLowerCase().includes(q) ||
                            c.code?.toLowerCase().includes(q) ||
                            c.supervisor?.toLowerCase().includes(q)
                        );
                    }
                    if (sortOrder === 'az') result.sort((a,b) => (a.name||'').localeCompare(b.name||'', 'ar'));
                    if (sortOrder === 'za') result.sort((a,b) => (b.name||'').localeCompare(a.name||'', 'ar'));
                    if (sortOrder === 'newest') result.sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);
                    if (sortOrder === 'oldest') result.sort((a,b) => (a.date||'') > (b.date||'') ? 1 : -1);
                    return result;
                };

                // ===== بحث عام (طلاب، برامج، دورات) =====
                const getGlobalSearchResults = () => {
                    const q = searchQuery.trim().toLowerCase();
                    if (!q) return null;
                    const results = { programs: [], courses: [], students: [] };
                    programs.forEach(p => {
                        if (p.name?.toLowerCase().includes(q) || p.nameEn?.toLowerCase().includes(q) || p.code?.toLowerCase().includes(q)) {
                            results.programs.push(p);
                        }
                        (p.courses || []).forEach(c => {
                            if (c.name?.toLowerCase().includes(q) || c.code?.toLowerCase().includes(q) || c.supervisor?.toLowerCase().includes(q)) {
                                results.courses.push({ ...c, programId: p.id, programName: p.name });
                            }
                            (c.students || []).forEach(s => {
                                if (s.name?.toLowerCase().includes(q) || s.email?.toLowerCase().includes(q) || s.phone?.toLowerCase().includes(q)) {
                                    results.students.push({ ...s, courseName: c.name, courseId: c.id, programId: p.id });
                                }
                            });
                        });
                    });
                    return results;
                };

                const globalResults = getGlobalSearchResults();

                // ===== الهيدر الثابت (يظهر دائماً) =====
                const SidebarHeader = ({ title }) => (
                    <div className="shrink-0 flex items-center gap-2 px-6 py-3" style={{background:'linear-gradient(135deg, #0790AC 0%, #0f6b7a 100%)', boxShadow:'0 2px 8px rgba(7,144,172,0.35)'}}>
                        {/* Expandable search */}
                        <div className="flex items-center gap-1 flex-1 min-w-0">
                            <button
                                onClick={() => setSearchOpen(v => !v)}
                                className="btn btn-icon btn-white-ghost shrink-0"
                                title="بحث عن طالب، برنامج أو دورة"
                            >
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                            </button>
                            <input
                                ref={searchInputRef}
                                type="text"
                                placeholder="بحث عن طالب، برنامج، دورة..."
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                                className={`sidebar-search-input ${searchOpen ? 'expanded' : ''}`}
                            />
                            {!searchOpen && <h2 className="text-sm font-bold text-white truncate">{title}</h2>}
                        </div>

                        {/* Sort button */}
                        <div className="relative shrink-0">
                            <button
                                onClick={() => setSortMenuOpen(v => !v)}
                                className="btn btn-icon btn-white-ghost"
                                title="ترتيب وفرز"
                            >
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4h13M3 8h9m-9 4h9m5-4v12m0 0l-4-4m4 4l4-4"/></svg>
                            </button>
                            {sortMenuOpen && (
                                <div className="absolute top-full left-0 mt-1 bg-white rounded-xl shadow-xl border border-gray-100 z-50 py-1 min-w-[170px] fade-in">
                                    {sortOptions.map(opt => (
                                        <button key={opt.key}
                                            onClick={() => { setSortOrder(opt.key); setSortMenuOpen(false); }}
                                            className={`w-full text-right px-4 py-2 text-xs font-medium transition-colors flex items-center justify-between gap-2
                                                ${sortOrder === opt.key ? 'text-medbox-main bg-medbox-light' : 'text-gray-700 hover:bg-gray-50'}`}
                                        >
                                            {opt.label}
                                            {sortOrder === opt.key && <svg className="w-3 h-3 text-medbox-main shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"/></svg>}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Add course button — رمز + فقط */}
                        {(isAdmin || isTrainer) && (
                            <button
                                onClick={() => selectedProgram
                                    ? setModal({ type: 'addCourse', programId: (programs.find(p => p.id === selectedProgram.id) || selectedProgram).id })
                                    : setModal({ type: 'addProgram' })}
                                className="btn btn-icon btn-white-ghost shrink-0"
                                title={selectedProgram ? 'إضافة دورة' : 'إضافة برنامج / دورة'}
                                style={{border:'1px solid rgba(255,255,255,0.25)'}}
                            >
                                <Icon name="plus" className="w-4 h-4" />
                            </button>
                        )}

                        {/* Close sidebar button — far left */}
                        <button
                            onClick={() => setSidebarOpen(false)}
                            className="btn btn-icon btn-white-ghost shrink-0"
                            title="إغلاق القائمة"
                            style={{borderRadius:'8px'}}
                        >
                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                );

                // ===== حالة البحث العام (عرض نتائج من كل الأنواع) =====
                if (globalResults) {
                    const { programs: pRes, courses: cRes, students: sRes } = globalResults;
                    const hasResults = pRes.length || cRes.length || sRes.length;
                    return (
                        <aside className="w-80 bg-gray-50 border-l border-gray-200 flex flex-col h-full overflow-hidden shrink-0" style={{boxShadow:'-4px 0 15px -3px rgba(0,0,0,0.05)'}}>
                            <SidebarHeader title="نتائج البحث" />
                            <div className="flex-1 overflow-y-auto p-3 space-y-4">
                                {!hasResults && (
                                    <div className="text-center py-10 text-gray-400 text-sm">لا توجد نتائج</div>
                                )}
                                {pRes.length > 0 && (
                                    <div>
                                        <p className="text-xs text-gray-400 font-bold mb-2 px-1">البرامج</p>
                                        <div className="space-y-2">
                                            {pRes.map(p => (
                                                <div key={p.id}
                                                    onClick={() => { setSelectedProgram(p); setSelectedStudent(null); setProgramDetails(null); setSearchQuery(''); setSearchOpen(false); }}
                                                    className="bg-white rounded-lg p-3 text-sm shadow-sm border border-gray-100 cursor-pointer hover:shadow-md flex items-center gap-2"
                                                >
                                                    <Icon name="stethoscope" className="w-4 h-4 text-medbox-main shrink-0" />
                                                    <span className="font-bold text-gray-700 truncate">{p.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {cRes.length > 0 && (
                                    <div>
                                        <p className="text-xs text-gray-400 font-bold mb-2 px-1">الدورات</p>
                                        <div className="space-y-2">
                                            {cRes.map(c => (
                                                <div key={c.id}
                                                    onClick={() => {
                                                        const prog = programs.find(p => p.id === c.programId);
                                                        setSelectedProgram(prog); setSelectedStudent(null); setProgramDetails(null); setSearchQuery(''); setSearchOpen(false);
                                                    }}
                                                    className="bg-white rounded-lg p-3 text-sm shadow-sm border border-gray-100 cursor-pointer hover:shadow-md"
                                                >
                                                    <p className="font-bold text-gray-700 truncate">{c.name}</p>
                                                    <p className="text-xs text-gray-400 mt-0.5">{c.programName}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {sRes.length > 0 && (
                                    <div>
                                        <p className="text-xs text-gray-400 font-bold mb-2 px-1">الطلاب</p>
                                        <div className="space-y-2">
                                            {sRes.map(s => (
                                                <div key={s.id}
                                                    onClick={() => { setSelectedStudent(s); setProgramDetails(null); setSearchQuery(''); setSearchOpen(false); }}
                                                    className="bg-white rounded-lg p-3 text-sm shadow-sm border border-gray-100 cursor-pointer hover:shadow-md flex items-center gap-2"
                                                >
                                                    <div className="w-6 h-6 rounded-full bg-medbox-main text-white flex items-center justify-center text-xs shrink-0">
                                                        {s.name?.charAt(0)}
                                                    </div>
                                                    <div className="min-w-0">
                                                        <p className="font-bold text-gray-700 truncate">{s.name}</p>
                                                        <p className="text-xs text-gray-400 truncate">{s.courseName}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </aside>
                    );
                }

                if (!selectedProgram) return (
                    <aside className="w-80 bg-white border-l border-gray-200 flex flex-col shrink-0" style={{boxShadow:'inset -4px 0 12px -6px rgba(0,0,0,0.04)'}}>
                        <SidebarHeader title="" />
                        <div className="flex-1 flex flex-col p-6 items-center justify-center text-center">
                            <Icon name="book" className="w-16 h-16 text-gray-300 mb-4" />
                            <h3 className="text-gray-500 font-medium text-sm">اختر برنامجاً لعرض دوراته</h3>
                        </div>
                    </aside>
                );

                const prog = programs.find(p => p.id === selectedProgram.id) || selectedProgram;
                const filteredCourses = getSortedAndFilteredCourses(prog.courses);

                return (
                    <aside className="w-80 bg-gray-50 border-l border-gray-200 flex flex-col h-full overflow-hidden shrink-0" style={{boxShadow:'-4px 0 15px -3px rgba(0,0,0,0.05)'}}>
                        <SidebarHeader title={prog.name} />

                        {/* Courses list */}
                        <div className="flex-1 overflow-y-auto p-3 space-y-3">
                            {filteredCourses.length === 0 && (
                                <div className="text-center py-10 text-gray-400 text-sm">
                                    {searchQuery ? 'لا نتائج للبحث' : 'لا توجد دورات'}
                                </div>
                            )}
                            {filteredCourses.map(course => (
                                <CourseCard key={course.id} course={course} programId={prog.id} />
                            ))}
                        </div>
                    </aside>
                );
            };

            // -------------------------------------------------------
            // CourseCard
            // -------------------------------------------------------
            const CourseCard = ({ course, programId }) => {
                const [isOpen, setIsOpen] = useState(false);
                return (
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden transition-all hover:shadow-md">
                        <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={() => setIsOpen(!isOpen)}>
                            <div className="flex justify-between items-start mb-2">
                                <div className="flex-1 ml-2">
                                    <h3 className="font-bold text-medbox-dark text-sm leading-tight font-mono">{course.code}</h3>
                                    {course.name && <p className="text-xs text-gray-500 mt-0.5 truncate">{course.name}</p>}
                                </div>
                                <div className="flex items-center gap-1 shrink-0">
                                    {isAdmin && (
                                        <button
                                            onClick={e => { e.stopPropagation(); setModal({ type: 'editCourse', programId, course }); }}
                                            className="btn btn-icon btn-ghost text-medbox-main hover:bg-medbox-light"
                                            title="تعديل الدورة"
                                        >
                                            <Icon name="edit" className="w-3.5 h-3.5" />
                                        </button>
                                    )}
                                    {isAdmin && (
                                        <button
                                            onClick={e => { e.stopPropagation(); handleDeleteCourse(programId, course.id); }}
                                            className="btn btn-icon btn-danger-ghost"
                                            title="حذف الدورة"
                                        >
                                            <Icon name="trash" className="w-3.5 h-3.5" />
                                        </button>
                                    )}
                                    <div className={`transform transition-transform text-gray-400 ${isOpen ? 'rotate-180' : ''}`}>
                                        <Icon name="chevronDown" className="w-4 h-4" />
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center justify-between text-xs text-gray-500">
                                <span>{course.date}{course.time ? ` · ${course.time}` : ''}</span>
                            </div>
                            {(course.location || course.supervisor) && (
                                <div className="text-xs text-gray-600 mt-2 flex items-center gap-1 border-t pt-2">
                                    <Icon name="user" className="w-3 h-3 text-medbox-main"/>
                                    <span>المشرف: <strong>{course.supervisor || '—'}</strong></span>
                                </div>
                            )}
                            {course.location && (
                                <div className="text-xs text-gray-500 mt-1 flex items-center gap-1">
                                    <Icon name="activity" className="w-3 h-3 text-medbox-main"/>
                                    <span>{course.location}</span>
                                </div>
                            )}
                            <div className="text-xs text-gray-500 mt-1 flex items-center gap-1">
                                <Icon name="users" className="w-3 h-3 text-medbox-main"/>
                                <span>عدد المسجلين: <strong>{course.students?.length || 0}</strong></span>
                            </div>
                        </div>
                        {isOpen && (
                            <div className="bg-gray-50 border-t border-gray-100 p-2 fade-in">
                                <div className="flex items-center justify-between px-2 mb-2">
                                    <p className="text-xs text-gray-400 font-medium">الطلاب ({course.students?.length || 0})</p>
                                    {(isAdmin || isTrainer) && (
                                        <button
                                            onClick={() => setModal({ type: 'addStudent', programId, courseId: course.id })}
                                            className="btn btn-sm text-medbox-main hover:text-medbox-dark font-semibold"
                                            style={{background:'transparent', padding:'0.2rem 0.4rem'}}
                                        >
                                            <Icon name="plus" className="w-3 h-3" /> إضافة
                                        </button>
                                    )}
                                </div>
                                <ul className="space-y-1">
                                    {(course.students || []).map(student => (
                                        <li key={student.id}
                                            className={`text-sm px-3 py-2 rounded-lg cursor-pointer transition-colors flex items-center justify-between group
                                                ${selectedStudent?.id === student.id ? 'bg-medbox-light text-medbox-dark font-bold' : 'hover:bg-gray-200 text-gray-700'}`}
                                        >
                                            <div className="flex items-center gap-2 flex-1" onClick={() => setSelectedStudent({ ...student, courseName: course.name, courseId: course.id, programId })}>
                                                <div className="w-6 h-6 rounded-full bg-medbox-main text-white flex items-center justify-center text-xs shrink-0">
                                                    {student.name?.charAt(0)}
                                                </div>
                                                <span className="truncate">{student.name}</span>
                                            </div>
                                            {(isAdmin || isTrainer) && (
                                                <button
                                                    onClick={e => { e.stopPropagation(); handleDeleteStudent(programId, course.id, student.id); }}
                                                    className="btn btn-icon btn-danger-ghost opacity-0 group-hover:opacity-100"
                                                    style={{padding:'0.2rem'}}
                                                >
                                                    <Icon name="trash" className="w-3 h-3" />
                                                </button>
                                            )}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}
                    </div>
                );
            };

            // -------------------------------------------------------
            // لوحة عرض تفاصيل الطالب
            // -------------------------------------------------------
            const StudentDetails = ({ student }) => {
                const [editProgress, setEditProgress] = useState(false);
                const [progressVal, setProgressVal]   = useState(student.progress || 0);
                return (

            // -------------------------------------------------------
            // عرض تفاصيل البرنامج (لوحة العرض الرئيسية)
            // -------------------------------------------------------
            const ProgramDetailsView = ({ program }) => {
                const prog = programs.find(p => p.id === program.id) || program;
                const obj = prog.objectives || {};
                const objRows = [
                    { key: 'knowledge', label: 'على مستوى المعلومات', icon: 'book' },
                    { key: 'skills',    label: 'على مستوى المهارات',  icon: 'activity' },

                                </div>

                        </div>

                        <div className="p-6 md:p-8 space-y-6">
                            {/* الهدف العام */}
                            {prog.generalGoal && (
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                                    <h3 className="text-base font-bold text-gray-800 mb-2 flex items-center gap-2">
                                        <Icon name="activity" className="w-4 h-4 text-medbox-main" />
                                        الهدف العام من البرنامج
                                    </h3>
                                    <p className="text-gray-600 text-sm leading-relaxed">{prog.generalGoal}</p>

                            {/* الأهداف التفصيلية */}
                            {objRows.some(r => obj[r.key]?.text) && (

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        {objRows.map(r => obj[r.key]?.text && (
                                            <div key={r.key} className="bg-medbox-light/40 rounded-xl p-4">
                                                <div className="flex items-center gap-2 mb-2 text-medbox-main">
                                                    <Icon name={r.icon} className="w-4 h-4" />
                                                    <h4 className="font-bold text-sm">{r.label}</h4>
                                                </div>
                                                <p className="text-gray-600 text-xs leading-relaxed whitespace-pre-line">{obj[r.key].text}</p>
                                            </div>

                                    </div>
                                </div>
                            )}

                            {/* المرفقات — دعم الملفات المتعددة والصيغة القديمة */}
                            {(prog.attachments?.length > 0 || prog.attachmentData) && (

                                                    {att.name}

                                        ) : (
                                            <a href={prog.attachmentData} download={prog.attachmentName || 'attachment'}
                                                className="btn btn-secondary btn-md inline-flex"
                                            >
                                                <Icon name="book" className="w-4 h-4" />
                                                {prog.attachmentName || 'الملف المرفق'}
                                            </a>

            // -------------------------------------------------------
            // اللوحة الرئيسية
            // -------------------------------------------------------
            const MainBoard = () => {
                if (activeTab !== 'programs') return (
                    <div className="flex-1 flex items-center justify-center flex-col text-gray-400">
                        <Icon name="book" className="w-20 h-20 mb-4 opacity-30" />
                        <h2 className="text-xl">{activeTab === 'skills' ? 'المهارات السريرية' : 'الكتب والأبحاث'}</h2>
                        <p className="mt-2 text-sm">قريباً...</p>
                    </div>
                );
                if (selectedStudent) return <StudentDetails student={selectedStudent} />;
                if (programDetails) return <ProgramDetailsView program={programDetails} />;
                return (
                    <div className="flex-1 p-6 md:p-8 overflow-y-auto fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800">البرامج التدريبية</h2>
                                <p className="text-gray-500 mt-1 text-sm">
                                    {isAdmin ? 'جميع البرامج — صلاحيات كاملة' : 'برامجك المخصصة'}

                            </div>

                                <button
                                    onClick={() => setModal({ type: 'addProgram' })}
                                    className="btn btn-primary btn-md hidden md:inline-flex"

                                    <Icon name="plus" className="w-4 h-4" />
                                    برنامج / دورة جديدة
                                </button>
                            )}
                        </div>

                        {visiblePrograms.length === 0 ? (
                            <div className="text-center py-20 text-gray-400">
                                <Icon name="book" className="w-16 h-16 mx-auto mb-4 opacity-30" />
                                <p>لا توجد برامج متاحة</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {visiblePrograms.map(program => (
                                    <div key={program.id}
                                        onClick={() => { setProgramDetails(program); setSelectedProgram(program); setSelectedStudent(null); }}
                                        className={`bg-white rounded-2xl p-6 shadow-sm border-2 cursor-pointer transition-all hover:shadow-lg hover:-translate-y-0.5 transform
                                            ${selectedProgram?.id === program.id ? 'border-medbox-main ring-4 ring-medbox-light' : 'border-transparent'}`}
                                    >
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="w-12 h-12 bg-medbox-light text-medbox-main rounded-xl flex items-center justify-center">
                                                <Icon name="stethoscope" className="w-6 h-6" />
                                            </div>
                                        <div className="flex items-center gap-1">
                                            {isAdmin && (
                                                <button
                                                    onClick={e => { e.stopPropagation(); setModal({ type: 'editProgram', program }); }}
                                                    className="btn btn-icon btn-ghost text-medbox-main hover:bg-medbox-light"
                                                    title="تعديل البرنامج"
                                                >
                                                    <Icon name="edit" className="w-4 h-4" />
                                                </button>
                                            )}
                                            {isAdmin && (
                                                <button
                                                    onClick={e => { e.stopPropagation(); handleDeleteProgram(program.id); }}
                                                    className="btn btn-icon btn-danger-ghost"
                                                    title="حذف البرنامج"
                                                >
                                                    <Icon name="trash" className="w-4 h-4" />
                                                </button>
                                            )}
                                        </div>
                                        </div>
                                        <h3 className="text-base font-bold text-gray-800 mb-2">{program.name}</h3>
                                        <p className="text-gray-500 text-sm leading-relaxed mb-4 line-clamp-2">{program.generalGoal}</p>
                                        <div className="flex items-center justify-between pt-4 border-t border-gray-100">
                                            <span className="text-xs font-bold text-medbox-main bg-medbox-light px-3 py-1 rounded-full">
                                                {program.courses?.length || 0} دورات
                                            </span>
                                            <span className="text-medbox-main text-sm font-medium flex items-center gap-1">
                                                عرض <Icon name="chevronLeft" className="w-4 h-4" />
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* FAB — زر إضافة عائم للموبايل وللمدير */}
                        {isAdmin && (
                            <button
                                onClick={() => setModal({ type: 'addProgram' })}
                                className="btn btn-fab md:hidden"
                                title="إضافة برنامج / دورة جديدة"
                            >
                                <Icon name="plus" className="w-6 h-6" />
                            </button>
                        )}
                    </div>
                );
            };

            // -------------------------------------------------------
            // Modal (نوافذ الإضافة)
            // -------------------------------------------------------
            const Modal = () => {
                const [form, setForm] = useState({});
                const [activeModalTab, setActiveModalTab] = useState('info');
                const [fileName, setFileName] = useState('');
                if (!modal) return null;

                const handleSubmit = (e) => {
                    e.preventDefault();
                    if (modal.type === 'addProgram')  handleAddProgram(form);
                    if (modal.type === 'editProgram') handleEditProgram(modal.program.id, form);
                    if (modal.type === 'addCourse')   handleAddCourse(modal.programId, form);
                    if (modal.type === 'editCourse')  handleEditCourse(modal.programId, modal.course.id, form);
                    if (modal.type === 'addStudent')  handleAddStudent(modal.programId, modal.courseId, form);
                };

                const handleFileChange = (e) => {
                    const files = Array.from(e.target.files || []);
                    if (!files.length) return;
                    const existingAttachments = form.attachments || [];
                    const readers = files.map(file => new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = () => resolve({ name: file.name, type: file.type, data: reader.result });
                        reader.readAsDataURL(file);
                    }));
                    Promise.all(readers).then(newFiles => {
                        const merged = [...existingAttachments, ...newFiles];
                        setForm(f => ({ ...f, attachments: merged }));
                        setFileName(merged.map(f => f.name).join('، '));
                    });
                };

                const handleRemoveAttachment = (idx) => {
                    const updated = (form.attachments || []).filter((_, i) => i !== idx);
                    setForm(f => ({ ...f, attachments: updated }));
                    setFileName(updated.map(f => f.name).join('، '));
                };

                const fields = {
                    addCourse: [
                        { key: 'date',       label: 'تاريخ البدء',  type: 'date' },
                        { key: 'location',   label: 'مكان إقامة الدورة', placeholder: 'مثال: قاعة التدريب الرئيسية' },
                        { key: 'time',       label: 'وقت الدورة',   type: 'time' },
                        { key: 'supervisor', label: 'اسم المشرف'                },
                    ],
                    editCourse: [
                        { key: 'date',       label: 'تاريخ البدء',  type: 'date' },
                        { key: 'location',   label: 'مكان إقامة الدورة', placeholder: 'مثال: قاعة التدريب الرئيسية' },
                        { key: 'time',       label: 'وقت الدورة',   type: 'time' },
                        { key: 'supervisor', label: 'اسم المشرف'                },
                    ],
                    addStudent: [
                        { key: 'name',  label: 'اسم المتدرب',       required: true },
                        { key: 'phone', label: 'رقم الهاتف',         type: 'tel'    },
                        { key: 'email', label: 'البريد الإلكتروني',  type: 'email'  },
                        { key: 'level', label: 'المستوى الدراسي',    placeholder: 'السنة الأولى' },
                    ],
                };

                // تهيئة form بالبيانات المسبقة عند التعديل
                React.useEffect(() => {
                    if (modal?.type === 'editProgram' && modal.program) {
                        setForm({ ...modal.program });
                        const atts = modal.program.attachments || (modal.program.attachmentData ? [{ name: modal.program.attachmentName, data: modal.program.attachmentData }] : []);
                        setForm(f => ({ ...f, attachments: atts }));
                        setFileName(atts.map(a => a.name).join('، '));
                    } else if (modal?.type === 'editCourse' && modal.course) {
                        setForm({ ...modal.course });
                    }
                }, []);

                const titles = {
                    addProgram:  'إضافة برنامج جديد',
                    editProgram: 'تعديل البرنامج',
                    addCourse:   'إضافة دورة جديدة',
                    editCourse:  'تعديل الدورة',
                    addStudent:  'إضافة متدرب جديد',
                };

                // ===== نموذج بسيط (دورة / متدرب) =====
                const renderSimpleForm = () => (
                    <form onSubmit={handleSubmit} className="p-6 space-y-4">
                        {fields[modal.type]?.map(({ key, label, required, textarea, type, placeholder }) => (
                            <div key={key}>
                                <label className="block text-sm font-medium text-gray-700 mb-1">{label}{required && <span className="text-red-500 mr-1">*</span>}</label>
                                {textarea ? (
                                    <textarea
                                        rows={3}
                                        value={form[key] || ''}
                                        onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                                        className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main resize-none"
                                    />
                                ) : (
                                    <input
                                        type={type || 'text'}
                                        required={required}
                                        placeholder={placeholder}
                                        value={form[key] || ''}
                                        onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))}
                                        className="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main"
                                    />
                                )}
                            </div>
                        ))}
                        <div className="flex gap-3 pt-2">
                            <button type="submit" disabled={loading} className="btn btn-primary btn-md flex-1">
                                {loading ? 'جاري الحفظ...' : 'حفظ'}
                            </button>
                            <button type="button" onClick={() => setModal(null)} className="btn btn-neutral btn-md flex-1">إلغاء</button>
                        </div>
                    </form>
                );

                // ===== نموذج البرنامج (تبويبات: بيانات البرنامج / المرفقات) =====
                const renderProgramForm = () => {
                    const inputCls = "w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main";
                    const labelCls = "block text-sm font-medium text-gray-700 mb-1";
                    const update = (key) => (e) => setForm(f => ({ ...f, [key]: e.target.value }));
                    const updateObj = (group, key) => (e) => setForm(f => ({
                        ...f,
                        objectives: { ...(f.objectives || {}), [group]: { ...((f.objectives || {})[group] || {}), [key]: e.target.value } }
                    }));

                    return (
                        <form onSubmit={handleSubmit}>
                            {/* Tabs */}
                            <div className="flex items-center gap-1 px-6 pt-3 border-b border-gray-100">
                                {[
                                    { key: 'info', label: 'بيانات البرنامج' },
                                    { key: 'attachments', label: 'المرفقات' },
                                ].map(t => (
                                    <button
                                        key={t.key}
                                        type="button"
                                        onClick={() => setActiveModalTab(t.key)}
                                        className={`px-4 py-2 text-sm font-bold rounded-t-lg transition-colors -mb-px border-b-2
                                            ${activeModalTab === t.key ? 'text-medbox-main border-medbox-main bg-medbox-light' : 'text-gray-500 border-transparent hover:text-medbox-main'}`}
                                    >
                                        {t.label}
                                    </button>
                                ))}
                            </div>

                            <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto">
                                {activeModalTab === 'info' && (
                                    <div className="space-y-4 fade-in">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className={labelCls}>اسم البرنامج (عربي)<span className="text-red-500 mr-1">*</span></label>
                                                <input type="text" required value={form.name || ''} onChange={update('name')} className={inputCls} dir="rtl" />
                                            </div>
                                            <div>
                                                <label className={labelCls}>اسم البرنامج (إنجليزي)<span className="text-red-500 mr-1">*</span></label>
                                                <input type="text" required value={form.nameEn || ''} onChange={update('nameEn')} className={inputCls} dir="ltr" placeholder="Program Name" />
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className={labelCls}>رمز البرنامج</label>
                                                <input type="text" value={form.code || ''} onChange={update('code')} className={inputCls} dir="ltr" placeholder="PRG-001" />
                                            </div>
                                            <div>
                                                <label className={labelCls}>مدة البرنامج</label>
                                                <input type="text" value={form.duration || ''} onChange={update('duration')} className={inputCls} placeholder="مثال: 6 أسابيع" />
                                            </div>
                                        </div>

                                        <div>
                                            <label className={labelCls}>الهدف العام من البرنامج<span className="text-red-500 mr-1">*</span></label>
                                            <textarea rows={3} required value={form.generalGoal || ''} onChange={update('generalGoal')} className={`${inputCls} resize-none`} />
                                        </div>

                                        <div className="border-t border-gray-100 pt-4">
                                            <h4 className="text-sm font-bold text-gray-800 mb-3">الأهداف التفصيلية</h4>
                                            <div className="space-y-3">
                                                <div>
                                                    <label className={labelCls}>على مستوى المعلومات</label>
                                                    <textarea rows={2} value={(form.objectives?.knowledge?.text) || ''} onChange={updateObj('knowledge','text')} className={`${inputCls} resize-none`} />
                                                </div>
                                                <div>
                                                    <label className={labelCls}>على مستوى المهارات</label>
                                                    <textarea rows={2} value={(form.objectives?.skills?.text) || ''} onChange={updateObj('skills','text')} className={`${inputCls} resize-none`} />
                                                </div>
                                                <div>
                                                    <label className={labelCls}>على مستوى الموقف (الاتجاهات)</label>
                                                    <textarea rows={2} value={(form.objectives?.attitude?.text) || ''} onChange={updateObj('attitude','text')} className={`${inputCls} resize-none`} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeModalTab === 'attachments' && (
                                    <div className="space-y-4 fade-in">
                                        <p className="text-sm text-gray-500">يمكنك إرفاق أكثر من ملف (PDF، Word، PowerPoint، ...).</p>
                                        <div className="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-medbox-main transition-colors">
                                            <input
                                                type="file"
                                                id="programAttachment"
                                                className="hidden"
                                                multiple
                                                onChange={handleFileChange}
                                            />
                                            <label htmlFor="programAttachment" className="cursor-pointer flex flex-col items-center gap-2">
                                                <Icon name="book" className="w-10 h-10 text-medbox-main opacity-60" />
                                                <span className="text-sm font-medium text-medbox-main">اختر ملفاً أو أكثر للرفع</span>
                                                <span className="text-xs text-gray-400">يمكن اختيار ملفات متعددة دفعة واحدة</span>
                                            </label>
                                        </div>
                                        {/* قائمة الملفات المرفوعة */}
                                        {(form.attachments || []).length > 0 && (
                                            <div className="space-y-2">
                                                <p className="text-xs text-gray-500 font-bold">الملفات المرفقة ({form.attachments.length}):</p>
                                                {(form.attachments || []).map((att, idx) => (
                                                    <div key={idx} className="flex items-center justify-between bg-medbox-light rounded-lg px-4 py-2.5">
                                                        <div className="flex items-center gap-2 min-w-0">
                                                            <Icon name="book" className="w-4 h-4 text-medbox-main shrink-0" />
                                                            <span className="text-xs text-medbox-dark font-medium truncate">{att.name}</span>
                                                        </div>
                                                        <button type="button" onClick={() => handleRemoveAttachment(idx)} className="text-red-400 hover:text-red-600 shrink-0 mr-2">
                                                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {/* عرض المرفقات القديمة (للتوافق مع البيانات القديمة) */}
                                        {!(form.attachments?.length) && form.attachmentName && (
                                            <div className="flex items-center gap-2 bg-medbox-light rounded-lg px-4 py-2.5">
                                                <Icon name="book" className="w-4 h-4 text-medbox-main shrink-0" />
                                                <span className="text-xs text-medbox-dark font-medium">{form.attachmentName}</span>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            <div className="flex gap-3 p-6 pt-0">
                                <button type="submit" disabled={loading} className="btn btn-primary btn-md flex-1">
                                    {loading ? 'جاري الحفظ...' : 'حفظ'}
                                </button>
                                <button type="button" onClick={() => setModal(null)} className="btn btn-neutral btn-md flex-1">إلغاء</button>
                            </div>
                        </form>
                    );
                };

                return (
                    <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
                        <div className={`bg-white rounded-2xl shadow-2xl w-full fade-in ${(modal.type === 'addProgram' || modal.type === 'editProgram') ? 'max-w-2xl' : 'max-w-md'}`}>
                            <div className="flex items-center justify-between p-6 border-b border-gray-100">
                                <h3 className="font-bold text-gray-800">{titles[modal.type]}</h3>
                                <button onClick={() => setModal(null)} className="text-gray-400 hover:text-gray-600 text-xl font-light">✕</button>
                            </div>
                            {(modal.type === 'addProgram' || modal.type === 'editProgram') ? renderProgramForm() : renderSimpleForm()}
                        </div>
                    </div>
                );
            };

            // -------------------------------------------------------
            // SettingsPanel — لوحة الإعدادات الجانبية
            // -------------------------------------------------------
            const SettingsPanel = () => {
                // جمع كل المدربين والطلاب من البرامج
                const allTrainers = [];
                const allStudents = [];
                programs.forEach(prog => {
                    (prog.courses || []).forEach(course => {
                        if (course.supervisor) {
                            const exists = allTrainers.find(t => t.name === course.supervisor);
                            if (!exists) allTrainers.push({ name: course.supervisor, courseName: course.code || course.name, programName: prog.name });
                        }
                        (course.students || []).forEach(s => {
                            allStudents.push({ ...s, courseName: course.code || course.name, programName: prog.name });
                        });
                    });
                });

                const tabs = [
                    { key: 'about',    label: 'حول البرنامج',      icon: 'shield'       },
                    { key: 'trainers', label: 'سجل المدربين',       icon: 'user'         },
                    { key: 'students', label: 'سجل المتدربين',      icon: 'users'        },
                ];

                return (
                    <div className="fixed inset-0 z-40 flex" onClick={() => setSettingsPanelOpen(false)}>
                        {/* Overlay */}
                        <div className="flex-1 bg-black bg-opacity-30" />
                        {/* Panel */}
                        <div
                            className="w-96 bg-white h-full flex flex-col shadow-2xl fade-in"
                            onClick={e => e.stopPropagation()}
                        >
                            {/* Header */}
                            <div className="flex items-center justify-between px-6 py-4 shrink-0" style={{background:'linear-gradient(135deg, #0790AC 0%, #0f6b7a 100%)'}}>
                                <div className="flex items-center gap-2 text-white">
                                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    <h2 className="font-bold text-base">الإعدادات</h2>
                                </div>
                                <button onClick={() => setSettingsPanelOpen(false)} className="btn btn-icon btn-white-ghost">
                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                            </div>

                            {/* Tabs */}
                            <div className="flex border-b border-gray-100 shrink-0 bg-gray-50">
                                {tabs.map(t => (
                                    <button key={t.key}
                                        onClick={() => setSettingsTab(t.key)}
                                        className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 transition-colors border-b-2
                                            ${settingsTab === t.key ? 'text-medbox-main border-medbox-main bg-white' : 'text-gray-500 border-transparent hover:text-medbox-main'}`}
                                    >
                                        <Icon name={t.icon} className="w-4 h-4" />
                                        {t.label}
                                    </button>
                                ))}
                            </div>

                            {/* Content */}
                            <div className="flex-1 overflow-y-auto p-6">
                                {settingsTab === 'about' && (
                                    <div className="space-y-6 fade-in">
                                        <div className="flex flex-col items-center text-center py-4">
                                            <div className="w-20 h-20 rounded-2xl overflow-hidden shadow-lg mb-4 border-4 border-medbox-light">
