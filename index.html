        /* ===== نظام أزرار موحّد ===== */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 0.4rem; font-family: 'Cairo', sans-serif; font-weight: 600;
            border-radius: 10px; transition: all 0.18s ease; cursor: pointer;
            border: none; outline: none;
        }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .btn:focus-visible { box-shadow: 0 0 0 3px rgba(7,144,172,0.35); }

        /* الحجوم */
        .btn-sm  { font-size: 0.75rem;  padding: 0.35rem 0.85rem; }
        .btn-md  { font-size: 0.85rem;  padding: 0.55rem 1.1rem;  }
        .btn-lg  { font-size: 0.95rem;  padding: 0.7rem 1.5rem;   }
        .btn-icon { padding: 0.5rem; border-radius: 8px; }

        /* الأنواع */
        .btn-primary   { background: #0790AC; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #0f6b7a; box-shadow: 0 4px 12px rgba(7,144,172,0.3); }

        .btn-secondary { background: #e0f2f4; color: #0f6b7a; }
        .btn-secondary:hover:not(:disabled) { background: #c7eaef; }

        .btn-ghost { background: transparent; color: #6b7280; }
        .btn-ghost:hover:not(:disabled) { background: #f3f4f6; color: #374151; }

        .btn-danger-ghost { background: transparent; color: #d1d5db; }
        .btn-danger-ghost:hover:not(:disabled) { background: #fef2f2; color: #ef4444; }

        .btn-white-ghost { background: rgba(255,255,255,0.15); color: #fff; }
        .btn-white-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.25); }

        .btn-neutral { background: #f3f4f6; color: #374151; }
        .btn-neutral:hover:not(:disabled) { background: #e5e7eb; }

        /* FAB — زر إضافة عائم */
        .btn-fab {
            position: fixed; bottom: 2rem; left: 2rem;
            width: 3.25rem; height: 3.25rem;
            background: #0790AC; color: #fff;
            border-radius: 50%; font-size: 1.5rem; font-weight: 400;
            box-shadow: 0 6px 20px rgba(7,144,172,0.45);
            z-index: 40;
        }
        .btn-fab:hover { background: #0f6b7a; box-shadow: 0 8px 24px rgba(7,144,172,0.55); transform: scale(1.06); }

        /* Sidebar header search expand */
        .sidebar-search-input {
            width: 0; opacity: 0; overflow: hidden;

        .sidebar-search-input.expanded { width: 130px; opacity: 1; padding: 0.3rem 0.6rem; }

        const LoadingScreen = ({ message = 'جاري التحميل...' }) => (
            <div className="h-screen flex flex-col items-center justify-center gap-4 bg-gray-50">
                <div className="spinner"></div>
                <p className="text-gray-500 text-sm">{message}</p>
            </div>
        );

        // ===========================================================
        // شاشة الطالب (قراءة فقط)
        // ===========================================================
        const StudentPortal = ({ currentUser, programs, onLogout }) => {
            // جمع الدورات المسجل بها الطالب فقط
            const myEnrollments = [];
            programs.forEach(prog => {
                prog.courses.forEach(course => {
                    const me = course.students.find(s => s.uid === currentUser.uid || s.email === currentUser.email);
                    if (me) myEnrollments.push({ ...me, courseName: course.name, courseCode: course.code, supervisor: course.supervisor, programName: prog.name });
                });
            });

            return (
                <div className="h-full flex flex-col">
                    {/* Navbar */}
                    <nav className="bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-6 py-3 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-medbox-main text-white p-2 rounded-lg">
                                <Icon name="activity" />
                            </div>
                            <h1 className="text-xl font-bold text-medbox-dark">MedBox<span className="font-light text-gray-500">-Education</span></h1>
                            <span className="bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1 rounded-full">بوابة المتدرب</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2 text-sm text-gray-600">
                                <div className="w-8 h-8 bg-medbox-main text-white rounded-full flex items-center justify-center font-bold text-sm">
                                    {currentUser.displayName?.charAt(0) || currentUser.email?.charAt(0).toUpperCase()}
                                </div>
                                <span className="hidden md:block">{currentUser.displayName || currentUser.email}</span>
                            </div>
                            <button onClick={onLogout} className="btn btn-ghost btn-sm text-gray-500 hover:text-red-500">
                                <Icon name="logout" className="w-4 h-4" />
                                <span className="hidden md:block">خروج</span>
                            </button>
                        </div>
                    </nav>

                    <div className="flex-1 overflow-y-auto p-6 md:p-8 fade-in">
                        {/* ترحيب */}
                        <div className="bg-gradient-to-l from-medbox-main to-medbox-dark rounded-2xl p-6 text-white mb-8">
                            <h2 className="text-2xl font-bold mb-1">مرحباً، {currentUser.displayName || 'متدرب'} 👋</h2>
                            <p className="text-medbox-light text-sm">هذه دوراتك المسجّلة وتقدمك الأكاديمي</p>
                        </div>

                        {myEnrollments.length === 0 ? (
                            <div className="text-center py-16 text-gray-400">
                                <Icon name="book" className="w-16 h-16 mx-auto mb-4 opacity-30" />
                                <p className="text-lg font-medium">لم يتم تسجيلك في أي دورة بعد</p>
                                <p className="text-sm mt-2">تواصل مع المدرب أو مدير البرنامج لإضافتك.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {myEnrollments.map((enr, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                                        <div className="bg-medbox-light px-6 py-4 border-b border-gray-100">
                                            <span className="text-xs font-bold text-medbox-main bg-white px-2 py-1 rounded">{enr.programName}</span>
                                            <h3 className="font-bold text-medbox-dark mt-2">{enr.courseName}</h3>
                                            <p className="text-xs text-gray-500 mt-1 font-mono">{enr.courseCode}</p>
                                        </div>
                                        <div className="p-5 space-y-4">
                                            {/* المدرب */}
                                            <div className="flex items-center gap-2 text-sm text-gray-600">
                                                <Icon name="user" className="w-4 h-4 text-medbox-main" />
                                                <span>المدرب: <strong>{enr.supervisor}</strong></span>
                                            </div>
                                            {/* التقدم */}
                                            <div>
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-sm text-gray-600">نسبة الإنجاز</span>
                                                    <span className="font-bold text-medbox-main">{enr.progress || 0}%</span>
                                                </div>
                                                <div className="w-full bg-gray-200 rounded-full h-2.5">
                                                    <div className="bg-medbox-main h-2.5 rounded-full transition-all" style={{ width: `${enr.progress || 0}%` }}></div>
                                                </div>
                                            </div>
                                            {/* الحالة والمستوى */}
                                            <div className="flex gap-3">
                                                <span className={`text-xs font-bold px-3 py-1 rounded-full ${enr.status === 'نشط' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}`}>
                                                    {enr.status || 'نشط'}
                                                </span>
                                                {enr.level && <span className="text-xs bg-gray-100 text-gray-600 px-3 py-1 rounded-full">{enr.level}</span>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ===========================================================
        // التطبيق الرئيسي (مدير + مدرب)
        // ===========================================================
        const MainApp = ({ currentUser, userProfile, programs, setPrograms, onLogout, showToast }) => {
            const [activeTab, setActiveTab]         = useState('programs');
            const [selectedProgram, setSelectedProgram] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [selectedTrainer, setSelectedTrainer] = useState(null);
            const [modal, setModal]                 = useState(null);
            const [loading, setLoading]             = useState(false);
            const [sidebarOpen, setSidebarOpen]     = useState(false);
            const [sidebarMode, setSidebarMode]     = useState('programs'); // 'programs' | 'settings'
            const [settingsTab, setSettingsTab]     = useState(null);
            const [programDetails, setProgramDetails] = useState(null);

            const fb = window._firebase;
            const isAdmin   = userProfile.role === 'admin';
            const isTrainer = userProfile.role === 'trainer';

            // فلترة البرامج حسب الدور
            const visiblePrograms = isAdmin
                ? programs
                : programs.map(prog => ({
                    ...prog,
                    courses: prog.courses.filter(c =>
                        (userProfile.assignedCourseIds || []).includes(c.id)
                    )
                  })).filter(p => p.courses.length > 0);

            // -------------------------------------------------------
            // CRUD — برامج
            // -------------------------------------------------------
            const handleAddProgram = async (formData) => {
                setLoading(true);
                try {
                    const newProg = { ...formData, courses: [], createdAt: fb.serverTimestamp() };
                    const ref = await fb.addDoc(fb.collection(fb.db, 'programs'), newProg);
                    setPrograms(prev => [...prev, { ...newProg, id: ref.id, courses: [] }]);
                    showToast('تمت إضافة البرنامج بنجاح ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteProgram = async (programId) => {
                if (!confirm('هل أنت متأكد من حذف هذا البرنامج وجميع دوراته؟')) return;
                setLoading(true);
                try {
                    await fb.deleteDoc(fb.doc(fb.db, 'programs', programId));
                    setPrograms(prev => prev.filter(p => p.id !== programId));
                    if (selectedProgram?.id === programId) setSelectedProgram(null);
                    showToast('تم حذف البرنامج ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleEditProgram = async (programId, formData) => {
                setLoading(true);
                try {
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), formData);
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, ...formData } : p));
                    if (selectedProgram?.id === programId) setSelectedProgram(p => ({ ...p, ...formData }));
                    if (programDetails?.id === programId) setProgramDetails(p => ({ ...p, ...formData }));
                    showToast('تم تحديث البرنامج ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // -------------------------------------------------------
            // CRUD — دورات
            // -------------------------------------------------------
            const handleAddCourse = async (programId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const existingCourses = prog.courses || [];

                    // ===== توليد رمز الدورة تلقائياً =====
                    // أول حرفين من الاسم الإنجليزي للبرنامج
                    const enName = (prog.nameEn || prog.name || 'XX').trim();
                    const prefix = (enName.replace(/[^a-zA-Z]/g, '').slice(0, 2) || 'XX').toUpperCase().padEnd(2, 'X');

                    // تاريخ الدورة (YYYYMMDD) أو تاريخ اليوم إن لم يحدد
                    const dateStr = (formData.date || new Date().toISOString().slice(0,10)).replace(/-/g, '');

                    // رقم تسلسلي غير مكرر
                    let seq = existingCourses.length + 1;
                    let code;
                    do {
                        code = `${prefix}-${dateStr}-${String(seq).padStart(2, '0')}`;
                        seq++;
                    } while (existingCourses.some(c => c.code === code));

                    const newCourse = { ...formData, code, id: Date.now(), students: [] };
                    const updatedCourses = [...existingCourses, newCourse];
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p =>
                        p.id === programId ? { ...p, courses: updatedCourses } : p
                    ));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast(`تمت إضافة الدورة ✓ — رمز الدورة: ${code}`);
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteCourse = async (programId, courseId) => {
                if (!confirm('هل أنت متأكد من حذف هذه الدورة؟')) return;
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.filter(c => c.id !== courseId);
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p =>
                        p.id === programId ? { ...p, courses: updatedCourses } : p
                    ));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم حذف الدورة ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleEditCourse = async (programId, courseId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => c.id === courseId ? { ...c, ...formData } : c);
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم تحديث الدورة ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // -------------------------------------------------------
            // CRUD — طلاب
            // -------------------------------------------------------
            const handleAddStudent = async (programId, courseId, formData) => {
                setLoading(true);
                try {
                    let authUid = null;
                    let accountMsg = '';

                    // إنشاء حساب Firebase Auth إذا كان البريد موجوداً
                    if (formData.email?.trim()) {
                        try {
                            const { uid, alreadyExists } = await createAuthAccount(
                                formData.email.trim(),
                                'student',
                                { name: formData.name }
                            );
                            authUid = uid;
                            accountMsg = alreadyExists
                                ? ' — تم إرسال رابط تعيين كلمة السر لبريده'
                                : ' — تم إنشاء حساب وإرسال رابط الدخول';
                        } catch (authErr) {
                            const msgs = {
                                'auth/email-already-in-use': 'البريد مسجل مسبقاً',
                                'auth/invalid-email': 'صيغة البريد غير صحيحة',
                            };
                            showToast('تحذير: ' + (msgs[authErr.code] || authErr.message));
                        }
                    }

                    // إذا لم يُحدَّد برنامج/دورة → احفظ في مجموعة students المستقلة
                    if (!programId || !courseId) {
                        if (fb?.addDoc && fb?.collection && fb?.db) {
                            await fb.addDoc(fb.collection(fb.db, 'students'), {
                                ...formData,
                                uid: authUid || null,
                                id: Date.now(),
                                progress: 0,
                                status: 'نشط',
                                createdAt: new Date().toISOString()
                            });
                        }
                        showToast('تمت إضافة المتدرب ✓' + accountMsg);
                        setModal(null);
                        setLoading(false);
                        return;
                    }

                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: [...(c.students||[]), {
                            ...formData,
                            uid: authUid || null,
                            id: Date.now(),
                            progress: 0,
                            status: 'نشط'
                        }]};
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تمت إضافة المتدرب ✓' + accountMsg);
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteStudent = async (programId, courseId, studentId) => {
                if (!confirm('هل أنت متأكد من حذف هذا المتدرب؟')) return;
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: c.students.filter(s => s.id !== studentId) };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    if (selectedStudent?.id === studentId) setSelectedStudent(null);
                    showToast('تم حذف المتدرب ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleEditStudent = async (programId, courseId, studentId, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: c.students.map(s => s.id === studentId ? { ...s, ...formData } : s) };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم تحديث بيانات المتدرب ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleEditTrainerInCourse = async (programId, courseId, role, formData) => {
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        if (role === 'رئيسي') return { ...c, supervisor: formData.name, supervisorEmail: formData.email || c.supervisorEmail };
                        if (role === 'مساعد') return { ...c, coSupervisor: formData.name, coSupervisorEmail: formData.email || c.coSupervisorEmail };
                        return c;
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم تحديث بيانات المدرب ✓');
                    setModal(null);
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleDeleteTrainerFromCourse = async (programId, courseId, role) => {
                if (!confirm('هل أنت متأكد من إزالة هذا المدرب من الدورة؟')) return;
                setLoading(true);
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        if (role === 'رئيسي') return { ...c, supervisor: '', supervisorEmail: '' };
                        if (role === 'مساعد') return { ...c, coSupervisor: '', coSupervisorEmail: '' };
                        return c;
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تمت إزالة المدرب من الدورة ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // حذف مدرب بشكل كامل: من Firestore (trainers + users) + من الدورة + حساب Auth
            const handleDeleteTrainer = async (trainer) => {
                if (!confirm(`هل أنت متأكد من حذف المدرب "${trainer.name}" بشكل نهائي؟\nسيتم حذف حسابه وجميع بياناته.`)) return;
                setLoading(true);
                const errors = [];
                try {
                    const { db, doc, deleteDoc, getDocs, collection, query, where, auth } = window._firebase;

                    // 1. حذف من مجموعة trainers المستقلة (إن وُجد)
                    if (trainer._firestoreId) {
                        try {
                            await deleteDoc(doc(db, 'trainers', trainer._firestoreId));
                        } catch(e) { errors.push('trainers: ' + e.message); }
                    } else {
                        // محاولة البحث بالبريد في مجموعة trainers
                        if (trainer.email) {
                            try {
                                const snap = await getDocs(query(collection(db, 'trainers'), where('email', '==', trainer.email)));
                                for (const d of snap.docs) await deleteDoc(doc(db, 'trainers', d.id));
                            } catch(e) { errors.push('trainers lookup: ' + e.message); }
                        }
                    }

                    // 2. مسح المدرب من الدورة (إن كان مرتبطاً ببرنامج/دورة)
                    if (trainer.courseName && trainer.courseName !== '—') {
                        try {
                            const prog = programs.find(p => (p.courses||[]).find(c =>
                                (c.code||c.name) === trainer.courseName &&
                                (c.supervisor === trainer.name || c.coSupervisor === trainer.name)
                            ));
                            const course = prog && (prog.courses||[]).find(c =>
                                (c.code||c.name) === trainer.courseName &&
                                (c.supervisor === trainer.name || c.coSupervisor === trainer.name)
                            );
                            if (prog && course) {
                                const updatedCourses = prog.courses.map(c => {
                                    if (c.id !== course.id) return c;
                                    const patch = {};
                                    if (c.supervisor === trainer.name) { patch.supervisor = ''; patch.supervisorEmail = ''; }
                                    if (c.coSupervisor === trainer.name) { patch.coSupervisor = ''; patch.coSupervisorEmail = ''; }
                                    return { ...c, ...patch };
                                });
                                await window._firebase.updateDoc(doc(db, 'programs', prog.id), { courses: updatedCourses });
                                setPrograms(prev => prev.map(p => p.id === prog.id ? { ...p, courses: updatedCourses } : p));
                                if (selectedProgram?.id === prog.id)
                                    setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                            }
                        } catch(e) { errors.push('course: ' + e.message); }
                    }

                    // 3. حذف وثيقة users/{uid} من Firestore
                    let uidToDelete = trainer.uid;
                    if (!uidToDelete && trainer.email) {
                        try {
                            const snap = await getDocs(query(collection(db, 'users'), where('email', '==', trainer.email)));
                            if (!snap.empty) { uidToDelete = snap.docs[0].id; }
                        } catch(e) { errors.push('users lookup: ' + e.message); }
                    }
                    if (uidToDelete) {
                        try { await deleteDoc(doc(db, 'users', uidToDelete)); } catch(e) { errors.push('users doc: ' + e.message); }
                    }

                    // 4. حذف حساب Firebase Auth عبر Cloud Function
                    // (الطريقة الوحيدة الموثوقة من Client-Side — تتطلب نشر deleteAuthUser Function)
                    if (uidToDelete) {
                        try {
                            const { functions, httpsCallable } = window._firebase;
                            const deleteAuthUser = httpsCallable(functions, 'deleteAuthUser');
                            await deleteAuthUser({ uid: uidToDelete });
                        } catch(e) {
                            errors.push('Auth delete: ' + (e.message || e.code));
                        }
                    }

                    if (errors.length > 0) {
                        showToast('تم الحذف جزئياً ⚠️ — ' + errors[0]);
                    } else {
                        showToast('✓ تم حذف المدرب وحسابه بالكامل');
                    }
                } catch(e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            const handleUpdateProgress = async (programId, courseId, studentId, newProgress) => {
                try {
                    const prog = programs.find(p => p.id === programId);
                    const updatedCourses = prog.courses.map(c => {
                        if (c.id !== courseId) return c;
                        return { ...c, students: c.students.map(s => s.id === studentId ? { ...s, progress: newProgress } : s) };
                    });
                    await fb.updateDoc(fb.doc(fb.db, 'programs', programId), { courses: updatedCourses });
                    setPrograms(prev => prev.map(p => p.id === programId ? { ...p, courses: updatedCourses } : p));
                    if (selectedProgram?.id === programId)
                        setSelectedProgram(p => ({ ...p, courses: updatedCourses }));
                    showToast('تم تحديث التقدم ✓');
                } catch (e) { showToast('خطأ: ' + e.message); }
            };

            // -------------------------------------------------------
            // مساعد: إنشاء حساب Firebase Auth + إرسال رابط كلمة السر
            // -------------------------------------------------------
            const createAuthAccount = async (email, role, extraData = {}) => {
                const {
                    auth, db, setDoc, doc,
                    sendPasswordResetEmail, fetchSignInMethodsForEmail,
                    createUserWithEmailAndPassword,
                    initializeApp, deleteApp, getAuth
                } = window._firebase;

                // فحص إذا كان البريد مسجل مسبقاً
                const methods = await fetchSignInMethodsForEmail(auth, email).catch(() => []);
                if (methods.length > 0) {
                    // المستخدم موجود مسبقاً — نرسل له رابط تعيين كلمة السر فقط
                    await sendPasswordResetEmail(auth, email);
                    return { uid: null, alreadyExists: true };
                }

                // كلمة سر مؤقتة عشوائية — لن يستخدمها أحد
                const tempPass = 'Tmp_' + Math.random().toString(36).slice(2, 10) + '!';

                // ✅ إنشاء Firebase App ثانوي مؤقت لإنشاء المستخدم
                // بهذا لا يتأثر الـ auth الرئيسي ولا تسقط جلسة المدير
                const secondaryApp = initializeApp(auth.app.options, 'secondary-' + Date.now());
                const secondaryAuth = getAuth(secondaryApp);

                try {
                    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, tempPass);
                    const newUid = cred.user.uid;

                    // إضافة بروفايل المستخدم في Firestore
                    await setDoc(doc(db, 'users', newUid), {
                        role,
                        email,
                        ...extraData,
                        createdAt: new Date().toISOString()
                    });

                    // إرسال رابط تعيين كلمة السر للبريد الجديد (من الـ auth الرئيسي)
                    await sendPasswordResetEmail(auth, email);

                    return { uid: newUid, alreadyExists: false };
                } finally {
                    // حذف الـ App الثانوي المؤقت فوراً بعد الانتهاء
                    await deleteApp(secondaryApp).catch(() => {});
                }
            };

            // CRUD — تعديل بيانات مدرب موجود في Firestore
            const handleSaveTrainerEdit = async (trainer, formData) => {
                setLoading(true);
                try {
                    const { db, doc, updateDoc, getDocs, collection, query, where } = window._firebase;
                    const { trainerFiles, ...restData } = formData;

                    const patch = {
                        ...restData,
                        ...(trainerFiles ? { attachments: trainerFiles } : {}),
                        updatedAt: new Date().toISOString(),
                    };

                    // تحديث في مجموعة trainers
                    let updated = false;
                    if (trainer._firestoreId) {
                        await updateDoc(doc(db, 'trainers', trainer._firestoreId), patch);
                        updated = true;
                    } else if (trainer.email) {
                        const snap = await getDocs(query(collection(db, 'trainers'), where('email', '==', trainer.email)));
                        for (const d of snap.docs) {
                            await updateDoc(doc(db, 'trainers', d.id), patch);
                            updated = true;
                        }
                    }

                    // تحديث في Firestore users إن وُجد uid
                    if (trainer.uid) {
                        try {
                            await updateDoc(doc(db, 'users', trainer.uid), {
                                name: formData.name,
                                nameEn: formData.nameEn,
                                specialty: formData.specialty,
                                updatedAt: new Date().toISOString(),
                            });
                        } catch(e) { /* تجاهل إن لم يوجد */ }
                    }

                    // تحديث الاسم في الدورات المرتبطة
                    if (trainer.name !== formData.name) {
                        const progs = programs.filter(p =>
                            (p.courses||[]).some(c => c.supervisor === trainer.name || c.coSupervisor === trainer.name)
                        );
                        for (const prog of progs) {
                            const updatedCourses = prog.courses.map(c => {
                                const patch2 = {};
                                if (c.supervisor === trainer.name) patch2.supervisor = formData.name;
                                if (c.coSupervisor === trainer.name) patch2.coSupervisor = formData.name;
                                return Object.keys(patch2).length ? { ...c, ...patch2 } : c;
                            });
                            await fb.updateDoc(fb.doc(fb.db, 'programs', prog.id), { courses: updatedCourses });
                            setPrograms(prev => prev.map(p => p.id === prog.id ? { ...p, courses: updatedCourses } : p));
                        }
                    }

                    showToast(updated ? '✓ تم حفظ التعديلات' : '⚠️ لم يُعثر على سجل المدرب في قاعدة البيانات');
                    setModal(null);
                } catch(e) { showToast('خطأ: ' + e.message); }
                setLoading(false);
            };

            // CRUD — إضافة مدرب مستقل (يُحفظ في مجموعة trainers منفصلة)
            const handleAddTrainer = async (formData) => {
                if (!formData.email?.trim()) {
                    showToast('البريد الإلكتروني مطلوب لإنشاء حساب المدرب');
                    return;
                }
                setLoading(true);
                try {
                    const { uid, alreadyExists } = await createAuthAccount(
                        formData.email.trim(),
                        'trainer',
                        { name: formData.name, nameEn: formData.nameEn, specialty: formData.specialty }
                    );

                    if (fb?.addDoc && fb?.collection && fb?.db) {
                        // استبعاد trainerFiles من Firestore وحفظها بشكل منفصل أو تجاهلها إن كانت كبيرة
                        const { trainerFiles, ...restData } = formData;
                        await fb.addDoc(fb.collection(fb.db, 'trainers'), {
                            ...restData,
                            uid: uid || null,
                            id: Date.now(),
                            createdAt: new Date().toISOString(),
                            // حفظ المرفقات كـ base64 في Firestore (مناسب للملفات الصغيرة)
                            ...(trainerFiles ? { attachments: trainerFiles } : {})
                        });
                    }

                    if (alreadyExists) {
                        showToast('✓ البريد مسجل مسبقاً — تم إرسال رابط تعيين كلمة السر');
                    } else {
                        showToast('✓ تمت إضافة المدرب وإرسال رابط الدخول لبريده');
                    }
                    setModal(null);
                } catch (e) {
                    const msgs = {
                        'auth/email-already-in-use': 'هذا البريد مسجل مسبقاً في النظام',
                        'auth/invalid-email': 'صيغة البريد الإلكتروني غير صحيحة',
                        'auth/operation-not-allowed': 'تسجيل الدخول بالبريد غير مفعّل في Firebase',
                    };
                    showToast('خطأ: ' + (msgs[e.code] || e.message));
                }
                setLoading(false);
            };

                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </button>
                        {/* معلومات المستخدم: أفاتار + إيميل + الصلاحية تحته */}
                        <div className="flex items-center gap-2 text-sm text-gray-600 border-r pr-3 border-gray-200">
                            <div className="w-8 h-8 bg-medbox-main text-white rounded-full flex items-center justify-center font-bold text-sm shrink-0">
                                {currentUser.email?.charAt(0).toUpperCase()}
                            </div>
                            <div className="hidden md:flex flex-col leading-tight">
                                <span className="text-xs text-gray-700 font-medium">{currentUser.email}</span>
                                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full self-start mt-0.5 ${roleBadge.color}`}>{roleBadge.label}</span>
                            </div>
                        </div>
                        <button onClick={onLogout} title="تسجيل الخروج" className="btn btn-icon btn-ghost text-gray-500 hover:text-red-500">
                            <Icon name="logout" className="w-5 h-5" />
                        </button>
                    </div>
                  </div>
                  {/* صف التبويبات في الموبايل */}
                  <div className="flex md:hidden items-center gap-1 bg-gray-100 rounded-lg p-1 mx-3 mb-2 overflow-x-auto">
                      {['programs','skills','books'].map(tab => (
                          <button key={tab}
                              onClick={() => { setActiveTab(tab); setSelectedStudent(null); setProgramDetails(null); setSelectedTrainer(null); if(tab==='programs'){ setSidebarMode('programs'); setSidebarOpen(false); } }}
                              className={`flex-1 px-3 py-2 rounded-md text-sm font-medium transition-colors whitespace-nowrap ${activeTab===tab ? 'bg-white text-medbox-main shadow-sm' : 'text-gray-600 hover:text-medbox-main'}`}
                          >
                              {tab==='programs'?'البرامج التدريبية':tab==='skills'?'المهارات السريرية':'كتب وأبحاث'}
                          </button>
                      ))}
                  </div>
                </nav>
            );

            // -------------------------------------------------------
            // مساعد: إعادة إرسال رابط تعيين كلمة السر
            // -------------------------------------------------------
            const resendPasswordLink = async (email, setLocalLoading) => {
                if (!email) { showToast('لا يوجد بريد إلكتروني مسجل'); return; }
                setLocalLoading(true);
                try {
                    const { auth, sendPasswordResetEmail } = window._firebase;
                    await sendPasswordResetEmail(auth, email);
                    showToast(`✓ تم إرسال رابط الدخول إلى ${email}`);
                } catch (e) {
                    const msgs = {
                        'auth/user-not-found': 'البريد غير مسجل في النظام — أضف المستخدم أولاً',
                        'auth/invalid-email':  'صيغة البريد غير صحيحة',
                        'auth/too-many-requests': 'طلبات كثيرة — انتظر قليلاً',
                    };
                    showToast('خطأ: ' + (msgs[e.code] || e.message));
                }
                setLocalLoading(false);
            };

            // -------------------------------------------------------
            // -------------------------------------------------------
            // ChangePasswordTab — شاشة تغيير كلمة السر
            // -------------------------------------------------------
            const ChangePasswordTab = ({ onBack, currentUser, showToast }) => {
                const [currentPass, setCurrentPass] = React.useState('');
                const [newPass, setNewPass]         = React.useState('');
                const [confirmPass, setConfirmPass] = React.useState('');
                const [loading, setLoading]         = React.useState(false);
                const [error, setError]             = React.useState('');
                const [success, setSuccess]         = React.useState(false);
                const [showCurrent, setShowCurrent] = React.useState(false);
                const [showNew, setShowNew]         = React.useState(false);
                const [showConfirm, setShowConfirm] = React.useState(false);

                // قوة كلمة السر
                const getStrength = (p) => {
                    if (!p) return { level: 0, label: '', color: '' };
                    let score = 0;
                    if (p.length >= 8)  score++;
                    if (p.length >= 12) score++;
                    if (/[A-Z]/.test(p)) score++;
                    if (/[0-9]/.test(p)) score++;
                    if (/[^A-Za-z0-9]/.test(p)) score++;
                    if (score <= 1) return { level: 1, label: 'ضعيفة',    color: 'bg-red-500'    };
                    if (score <= 2) return { level: 2, label: 'مقبولة',   color: 'bg-amber-400'  };
                    if (score <= 3) return { level: 3, label: 'جيدة',     color: 'bg-yellow-400' };
                    if (score <= 4) return { level: 4, label: 'قوية',     color: 'bg-green-400'  };
                    return               { level: 5, label: 'ممتازة',   color: 'bg-green-600'  };
                };
                const strength = getStrength(newPass);

                const firebaseErrors = {
                    'auth/wrong-password':          'كلمة السر الحالية غير صحيحة',
                    'auth/invalid-credential':       'كلمة السر الحالية غير صحيحة',
                    'auth/too-many-requests':        'محاولات كثيرة — انتظر قليلاً ثم حاول',
                    'auth/requires-recent-login':    'انتهت الجلسة — يرجى تسجيل الخروج والدخول مجدداً',
                    'auth/weak-password':            'كلمة السر الجديدة ضعيفة جداً (6 أحرف على الأقل)',
                    'auth/network-request-failed':   'خطأ في الاتصال بالإنترنت',
                };

                const handleSubmit = async () => {
                    setError('');
                    if (!currentPass || !newPass || !confirmPass) {
                        setError('يرجى ملء جميع الحقول');
                        return;
                    }
                    if (newPass !== confirmPass) {
                        setError('كلمة السر الجديدة وتأكيدها غير متطابقتين');
                        return;
                    }
                    if (newPass.length < 6) {
                        setError('كلمة السر الجديدة يجب أن تكون 6 أحرف على الأقل');
                        return;
                    }
                    if (newPass === currentPass) {
                        setError('كلمة السر الجديدة يجب أن تختلف عن الحالية');
                        return;
                    }
                    setLoading(true);
                    try {
                        const { auth, updatePassword, reauthenticateWithCredential, EmailAuthProvider } = window._firebase;
                        const user = auth.currentUser;
                        // إعادة التحقق أولاً
                        const credential = EmailAuthProvider.credential(user.email, currentPass);
                        await reauthenticateWithCredential(user, credential);
                        // تحديث كلمة السر
                        await updatePassword(user, newPass);
                        setSuccess(true);
                        showToast('تم تغيير كلمة السر بنجاح ✓');
                    } catch (e) {
                        setError(firebaseErrors[e.code] || ('خطأ: ' + e.message));
                    } finally {
                        setLoading(false);
                    }
                };

                if (success) return (
                    <div className="flex-1 flex flex-col items-center justify-center p-6 fade-in">
                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4">
                            <svg className="w-10 h-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <h3 className="text-lg font-bold text-gray-800 mb-1">تم بنجاح!</h3>
                        <p className="text-sm text-gray-500 mb-6 text-center">تم تغيير كلمة السر بنجاح.<br/>ستُستخدم كلمة السر الجديدة في تسجيل الدخول القادم.</p>
                        <button onClick={onBack} className="btn btn-primary px-6 py-2">العودة للإعدادات</button>
                    </div>
                );

                return (
                    <div className="flex-1 flex flex-col overflow-hidden fade-in">
                        <button onClick={onBack}
                            className="flex items-center gap-2 px-5 py-3 text-sm text-medbox-main font-bold hover:bg-gray-50 border-b border-gray-100 w-full transition-colors">
                            <svg className="w-4 h-4 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                            رجوع
                        </button>
                        <div className="flex-1 overflow-y-auto p-5 space-y-5">
                            {/* بطاقة المستخدم */}
                            <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 flex items-center gap-3">
                                <div className="w-10 h-10 bg-medbox-main text-white rounded-full flex items-center justify-center font-bold text-base shrink-0">
                                    {currentUser?.email?.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <p className="text-xs text-gray-500">تغيير كلمة السر لـ</p>
                                    <p className="text-sm font-bold text-gray-800" dir="ltr">{currentUser?.email}</p>
                                </div>
                            </div>

                            {/* حقل كلمة السر الحالية */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1.5">كلمة السر الحالية</label>
                                <div className="relative">
                                    <input
                                        type={showCurrent ? 'text' : 'password'}
                                        value={currentPass}
                                        onChange={e => { setCurrentPass(e.target.value); setError(''); }}
                                        placeholder="أدخل كلمة السر الحالية"
                                        className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main pr-10"
                                        dir="ltr"
                                    />
                                    <button type="button" onClick={() => setShowCurrent(v => !v)}
                                        className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                        <Icon name={showCurrent ? 'eyeOff' : 'eye'} className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>

                            {/* حقل كلمة السر الجديدة */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1.5">كلمة السر الجديدة</label>
                                <div className="relative">
                                    <input
                                        type={showNew ? 'text' : 'password'}
                                        value={newPass}
                                        onChange={e => { setNewPass(e.target.value); setError(''); }}
                                        placeholder="أدخل كلمة السر الجديدة"
                                        className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main pr-10"
                                        dir="ltr"
                                    />
                                    <button type="button" onClick={() => setShowNew(v => !v)}
                                        className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                        <Icon name={showNew ? 'eyeOff' : 'eye'} className="w-4 h-4" />
                                    </button>
                                </div>
                                {/* مؤشر قوة كلمة السر */}
                                {newPass && (
                                    <div className="mt-2">
                                        <div className="flex gap-1 mb-1">
                                            {[1,2,3,4,5].map(i => (
                                                <div key={i} className={`h-1 flex-1 rounded-full transition-all ${i <= strength.level ? strength.color : 'bg-gray-200'}`} />
                                            ))}
                                        </div>
                                        <p className={`text-xs font-medium ${strength.level <= 2 ? 'text-red-500' : strength.level <= 3 ? 'text-amber-500' : 'text-green-600'}`}>
                                            قوة كلمة السر: {strength.label}
                                        </p>
                                    </div>
                                )}
                            </div>

                            {/* تأكيد كلمة السر */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1.5">تأكيد كلمة السر الجديدة</label>
                                <div className="relative">
                                    <input
                                        type={showConfirm ? 'text' : 'password'}
                                        value={confirmPass}
                                        onChange={e => { setConfirmPass(e.target.value); setError(''); }}
                                        placeholder="أعد إدخال كلمة السر الجديدة"
                                        className={`w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-medbox-main pr-10 ${
                                            confirmPass && newPass !== confirmPass ? 'border-red-400 bg-red-50' :
                                            confirmPass && newPass === confirmPass ? 'border-green-400 bg-green-50' :
                                            'border-gray-200'
                                        }`}
                                        dir="ltr"
                                    />
                                    <button type="button" onClick={() => setShowConfirm(v => !v)}
                                        className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                        <Icon name={showConfirm ? 'eyeOff' : 'eye'} className="w-4 h-4" />
                                    </button>
                                </div>
                                {confirmPass && newPass !== confirmPass && (
                                    <p className="text-xs text-red-500 mt-1">كلمتا السر غير متطابقتين</p>
                                )}
                                {confirmPass && newPass === confirmPass && (
                                    <p className="text-xs text-green-600 mt-1">✓ كلمتا السر متطابقتان</p>
                                )}
                            </div>

                            {/* رسالة الخطأ */}
                            {error && (
                                <div className="bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 flex items-start gap-2">
                                    <svg className="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd"/></svg>
                                    {error}
                                </div>
                            )}

                            {/* تلميح الأمان */}
                            <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 text-xs text-amber-700">
                                <p className="font-bold mb-1">💡 نصائح لكلمة سر قوية:</p>
                                <ul className="space-y-0.5 list-disc list-inside">
                                    <li>8 أحرف على الأقل</li>
                                    <li>مزيج من الأحرف الكبيرة والصغيرة</li>
                                    <li>أرقام ورموز خاصة (@، #، !...)</li>
                                </ul>
                            </div>

                            {/* زر الحفظ */}
                            <button
                                onClick={handleSubmit}
                                disabled={loading || !currentPass || !newPass || !confirmPass}
                                className="w-full btn btn-primary py-3 text-base font-bold disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                            >
                                {loading ? (
                                    <><div className="spinner" style={{width:18,height:18,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'#fff'}} /> جاري الحفظ...</>
                                ) : (
                                    <><Icon name="lock" className="w-4 h-4" /> حفظ كلمة السر الجديدة</>
                                )}
                            </button>
                        </div>
                    </div>
                );
            };

            // -------------------------------------------------------
            // SettingsContent — محتوى الإعدادات داخل الـ Sidebar
            // -------------------------------------------------------
            const SettingsContent = ({ searchQuery: settingsSearchQuery = '', sortOrder: settingsSortOrder = 'default' }) => {
                const [resendingId, setResendingId] = React.useState(null);
                const [independentTrainers, setIndependentTrainers] = React.useState([]);
                const [independentStudents, setIndependentStudents] = React.useState([]);

                // جلب المدربين والمتدربين المستقلين من Firestore عند فتح القسم
                React.useEffect(() => {
                    if (!fb?.getDocs || !fb?.collection || !fb?.db) return;
                    fb.getDocs(fb.collection(fb.db, 'trainers'))
                        .then(snap => {
                            setIndependentTrainers(snap.docs.map(d => ({ ...d.data(), _firestoreId: d.id, _independent: true })));
                        })
                        .catch(() => {});
                    fb.getDocs(fb.collection(fb.db, 'students'))
                        .then(snap => {
                            setIndependentStudents(snap.docs.map(d => ({ ...d.data(), _firestoreId: d.id, _independent: true })));
                        })
                        .catch(() => {});
                }, []);

                const allTrainers = [];
                const allStudents = [];
                programs.forEach(prog => {
                    (prog.courses || []).forEach(course => {
                        if (course.supervisor) {
                            const exists = allTrainers.find(t => t.name === course.supervisor && t.courseName === (course.code || course.name));
                            if (!exists) allTrainers.push({ name: course.supervisor, role: 'رئيسي', courseName: course.code || course.name, programName: prog.name, email: course.supervisorEmail || null, uid: null });
                        }
                        if (course.coSupervisor) {
                            const exists = allTrainers.find(t => t.name === course.coSupervisor && t.courseName === (course.code || course.name));
                            if (!exists) allTrainers.push({ name: course.coSupervisor, role: 'مساعد', courseName: course.code || course.name, programName: prog.name, email: course.coSupervisorEmail || null, uid: null });
                        }
                        (course.students || []).forEach(s => {
                            allStudents.push({ ...s, courseName: course.code || course.name, programName: prog.name });
                        });
                    });
                });

                // دمج المدربين/المتدربين المستقلين (المضافين من سجل الإعدادات)
                independentTrainers.forEach(t => {
                    const exists = allTrainers.find(x => x.email && x.email === t.email);
                    if (!exists) allTrainers.push({ ...t, role: t.role || 'مستقل', courseName: t.courseName || '—', programName: t.programName || '—', email: t.email || null, uid: t.uid || null, _independent: true });
                });
                independentStudents.forEach(s => {
                    const exists = allStudents.find(x => (x.email && x.email === s.email) || (x.id && x.id === s.id));
                    if (!exists) allStudents.push({ ...s, courseName: s.courseName || '—', programName: s.programName || '—', _independent: true });
                });

                // دائرة الحالة فوق الأفاتار
                const StatusDot = ({ uid }) => {
                    if (!uid) return null;
                    return (
                        <span title="حساب مفعّل" style={{position:'absolute',top:0,right:0,width:10,height:10,borderRadius:'50%',background:'#22c55e',border:'2px solid white',display:'block'}} />
                    );
                };

                // زر Glass صغير
                const GlassBtn = ({ onClick, title, children, danger }) => (
                    <button
                        onClick={onClick}
                        title={title}
                        style={{
                            background: danger ? 'rgba(239,68,68,0.10)' : 'rgba(255,255,255,0.55)',
                            backdropFilter: 'blur(6px)',
                            WebkitBackdropFilter: 'blur(6px)',
                            border: danger ? '1px solid rgba(239,68,68,0.20)' : '1px solid rgba(255,255,255,0.55)',
                            borderRadius: 8,
                            width: 30,
                            height: 30,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            cursor: 'pointer',
                            color: danger ? '#ef4444' : '#4b5563',
                            transition: 'all .15s',
                            flexShrink: 0,
                        }}
                        onMouseEnter={e => e.currentTarget.style.background = danger ? 'rgba(239,68,68,0.18)' : 'rgba(255,255,255,0.80)'}
                        onMouseLeave={e => e.currentTarget.style.background = danger ? 'rgba(239,68,68,0.10)' : 'rgba(255,255,255,0.55)'}
                    >
                        {children}
                    </button>
                );

                // زر إعادة إرسال الرابط (أيقونة glass فقط)
                const ResendBtn = ({ email, uid, rowId }) => {
                    if (!email) return null;
                    const isBusy = resendingId === rowId;
                    return (
                        <GlassBtn
                            title={uid ? 'إعادة إرسال رابط الدخول' : 'إرسال رابط تعيين كلمة السر'}
                            onClick={async (e) => {
                                e.stopPropagation();
                                setResendingId(rowId);
                                await resendPasswordLink(email, () => {});
                                setResendingId(null);
                            }}
                        >
                            {isBusy ? (
                                <div className="spinner" style={{width:11,height:11,borderWidth:2}} />
                            ) : (
                                <svg style={{width:13,height:13}} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                            )}
                        </GlassBtn>
                    );
                };

                // شارة الحالة للمتدربين
                const AuthBadge = ({ uid, email }) => {
                    if (uid) return (
                        <span title="حساب مفعّل" className="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700 shrink-0">
                            <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"/></svg>
                            مفعّل
                        </span>
                    );
                    if (email) return (
                        <span title="بريد مسجل" className="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 shrink-0">
                            في الانتظار
                        </span>
                    );
                    return null;
                };

                const BackBtn = ({ label }) => (
                    <button onClick={() => setSettingsTab(null)}
                        className="flex items-center gap-2 px-5 py-3 text-sm text-medbox-main font-bold hover:bg-gray-50 border-b border-gray-100 w-full transition-colors">
                        <svg className="w-4 h-4 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                        {label}
                    </button>
                );

                if (settingsTab === null) return (
                    <div className="flex-1 overflow-y-auto p-4 space-y-3 fade-in">

                    const files = Array.from(e.target.files || []);

                        const reader = new FileReader();
                        reader.onload = () => resolve({ name: file.name, type: file.type, data: reader.result });
                        reader.readAsDataURL(file);
                    }));
                    Promise.all(readers).then(newFiles => {
                        const merged = [...existingAttachments, ...newFiles];
                        setForm(f => ({ ...f, attachments: merged }));
                        setFileName(merged.map(f => f.name).join('، '));
                    });
                };

                const handleRemoveAttachment = (idx) => {
                    const updated = (form.attachments || []).filter((_, i) => i !== idx);

                    setFileName(updated.map(f => f.name).join('، '));

                const fields = {
                    addCourse: [
                        { key: 'date',          label: 'تاريخ البدء',         type: 'date',  required: true },

                        { key: 'phone', label: 'رقم الهاتف',         type: 'tel'    },
                        { key: 'level', label: 'المستوى الدراسي'    },

            return (

        };

        // ===========================================================
        // Root — إدارة المصادقة والتوجيه
        // ===========================================================
        const Root = () => {
            const [fbReady, setFbReady]           = useState(!!window._firebaseReady);
            const [isConfigured, setIsConfigured] = useState(false);
            const [authState, setAuthState]       = useState('loading'); // loading | loggedOut | loggedIn
            const [currentUser, setCurrentUser]   = useState(null);
            const [userProfile, setUserProfile]   = useState(null);
            const [programs, setPrograms]         = useState([]);
            const [dataLoading, setDataLoading]   = useState(false);
            const [toast, setToast]               = useState('');

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3500);
            };

            // انتظار تهيئة Firebase
            useEffect(() => {
                if (window._firebaseReady) {
                    setFbReady(true);
                } else {
                    window.addEventListener('firebase-ready', () => setFbReady(true), { once: true });
                }
            }, []);

            // التحقق من إعدادات Firebase
            useEffect(() => {
                if (!fbReady) return;
                const { auth } = window._firebase;
                // إذا كانت الإعدادات وهمية سنلاحظه من خلال خطأ الـ auth
                setIsConfigured(!auth.config?.apiKey?.includes('PASTE_YOUR'));
            }, [fbReady]);

            // مراقبة حالة تسجيل الدخول
            useEffect(() => {
                if (!fbReady || !isConfigured) return;
                const { auth, db, onAuthStateChanged, getDoc, doc } = window._firebase;
                const unsub = onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        setCurrentUser(user);
                        // جلب بروفايل المستخدم من Firestore
                        try {
                            const snap = await getDoc(doc(db, 'users', user.uid));
                            if (snap.exists()) {
                                setUserProfile(snap.data());
                                setAuthState('loggedIn');
                            } else {
                                // مستخدم موجود في Auth لكن بدون دور — عامله كطالب
                                setUserProfile({ role: 'student' });
                                setAuthState('loggedIn');
                            }
                        } catch (e) {
                            setUserProfile({ role: 'student' });
                            setAuthState('loggedIn');
                        }
                    } else {
                        setCurrentUser(null);
                        setUserProfile(null);
                        setAuthState('loggedOut');
                    }
                });
                return () => unsub();
            }, [fbReady, isConfigured]);

            // جلب البرامج من Firestore
            useEffect(() => {
                if (authState !== 'loggedIn') return;
                const { db, collection, getDocs } = window._firebase;
                setDataLoading(true);
                getDocs(collection(db, 'programs'))
                    .then(snap => {
                        const progs = snap.docs.map(d => ({ ...d.data(), id: d.id }));
                        setPrograms(progs);
                    })
                    .catch(e => showToast('خطأ في جلب البيانات: ' + e.message))
                    .finally(() => setDataLoading(false));
            }, [authState]);

            const handleLogout = async () => {
                const { auth, signOut } = window._firebase;
                await signOut(auth);
            };

            // --- عرض الشاشات ---
            if (!fbReady) return <LoadingScreen message="جاري تحميل Firebase..." />;
            if (!isConfigured) return <SetupScreen />;
            if (authState === 'loading') return <LoadingScreen message="جاري التحقق من الجلسة..." />;
            if (authState === 'loggedOut') return <LoginScreen />;
            if (dataLoading) return <LoadingScreen message="جاري تحميل البيانات..." />;

            return (
                <div className="h-full flex flex-col relative">
                    {userProfile?.role === 'student' ? (
                        <StudentPortal
                            currentUser={currentUser}
                            programs={programs}
                            onLogout={handleLogout}
                        />
                    ) : (
                        <MainApp
                            currentUser={currentUser}
                            userProfile={userProfile}
                            programs={programs}
                            setPrograms={setPrograms}
                            onLogout={handleLogout}
                            showToast={showToast}
                        />
                    )}

                    {/* Toast */}
                    {toast && (
                        <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 z-50 fade-in text-sm whitespace-nowrap">
                            <Icon name="shield" className="w-4 h-4 text-medbox-main" />
                            {toast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Root />);
    </script>
</body>
</html>
